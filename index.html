<title>Band 8 Center — Mobile</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --bg:#F5F6FA; --surface:#FFFFFF; --surface-2:#FAFBFD;
    --ink:#15182B; --ink-soft:#6B7180; --ink-faint:#9AA0AE;
    --border:#E6E8F0;
    --accent:#4C5FD7; --accent-soft:#EBEDFB; --accent-dim:#DEE1F8;
    --teal:#17A398; --teal-soft:#E4F5F3;
    --amber:#E8A93A; --amber-soft:#FCF1DD;
    --violet:#9B5DE5; --violet-soft:#F1E8FC;
    --coral:#E2574C; --coral-soft:#FBEAE8;
    --shadow: 0 1px 2px rgba(20,22,50,.04), 0 8px 24px rgba(20,22,50,.06);
    --radius: 16px; --radius-sm: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  [data-theme="dark"]{
    --bg:#0E1016; --surface:#171A24; --surface-2:#1D202C;
    --ink:#EEF0F6; --ink-soft:#9AA0B4; --ink-faint:#666C80;
    --border:#272B3A;
    --accent:#7C8CF8; --accent-soft:#232748; --accent-dim:#2A2F55;
    --teal:#3FCDBF; --teal-soft:#123430;
    --amber:#F0BB5C; --amber-soft:#3A2E14;
    --violet:#B583EF; --violet-soft:#2C1F42;
    --coral:#F1786D; --coral-soft:#3A1E1D;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
    transition:background .25s ease, color .25s ease;
  }
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  .app{display:flex; flex-direction:column; min-height:100vh;}

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:calc(12px + var(--safe-top)) 16px 12px;
    background:var(--surface); border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:10;
  }
  .topbar h1{font-size:17px; margin:0; font-weight:700;}
  .topbar-right{display:flex; align-items:center; gap:10px;}
  .streak-chip{
    display:flex; align-items:center; gap:5px; background:var(--amber-soft); color:var(--amber);
    padding:5px 10px; border-radius:20px; font-size:12px; font-weight:700;
  }
  .theme-toggle{
    width:34px; height:34px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface-2); display:flex; align-items:center; justify-content:center;
    font-size:15px; cursor:pointer;
  }

  .content{
    flex:1; padding:16px 16px calc(90px + var(--safe-bottom));
    max-width:600px; margin:0 auto; width:100%;
  }
  .section{animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

  /* Bottom tab bar */
  .bottom-nav{
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    display:flex; background:var(--surface); border-top:1px solid var(--border);
    padding:6px 4px calc(6px + var(--safe-bottom));
    box-shadow:0 -2px 12px rgba(20,22,50,.06);
  }
  .bottom-tab{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
    padding:6px 2px; border-radius:12px; color:var(--ink-faint); font-size:10.5px; font-weight:600;
    cursor:pointer; transition:color .15s ease, background .15s ease;
  }
  .bottom-tab .bt-icon{font-size:19px; line-height:1;}
  .bottom-tab.active{color:var(--accent); background:var(--accent-soft);}

  /* Sub navigation (segmented control for Practice / Vocab groups) */
  .subtabs{
    display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px;
    -webkit-overflow-scrolling:touch;
  }
  .subtabs::-webkit-scrollbar{display:none;}
  .subtab{
    flex-shrink:0; padding:8px 16px; border-radius:20px; font-size:13px; font-weight:600;
    background:var(--surface-2); border:1px solid var(--border); color:var(--ink-soft); cursor:pointer;
  }
  .subtab.active{background:var(--accent); color:#fff; border-color:var(--accent);}

  .back-bar{
    display:flex; align-items:center; gap:4px; font-size:14px; font-weight:600; color:var(--accent);
    margin-bottom:14px; cursor:pointer; padding:4px 0;
  }
  .back-bar span{font-size:18px;}

  /* More menu rows */
  .more-row{display:flex; align-items:center; gap:14px; padding:14px 12px; border-radius:12px; cursor:pointer; transition:background .15s ease;}
  .more-row:active{background:var(--surface-2);}
  .more-row-icon{width:40px; height:40px; border-radius:11px; background:var(--accent-soft); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;}
  .more-row-title{font-size:14.5px; font-weight:600;}
  .more-row-sub{font-size:12px; color:var(--ink-soft); margin-top:1px;}
  .more-row-chevron{color:var(--ink-faint); font-size:20px;}

  .grid{display:grid; gap:14px;}
  .grid-4{grid-template-columns:repeat(2,1fr);}
  .grid-3{grid-template-columns:repeat(2,1fr);}
  .grid-2{grid-template-columns:1fr;}

  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; box-shadow:var(--shadow); transition:background .25s ease, border-color .25s ease;
  }
  .card.tight{padding:14px;}
  .card-title{
    font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft);
    font-weight:700; margin:0 0 12px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  .stat-value{font-size:26px; font-weight:700; font-family:'Space Grotesk',sans-serif;}
  .stat-sub{font-size:12px; color:var(--ink-soft); margin-top:2px;}

  .progress-track{width:100%; height:9px; border-radius:6px; background:var(--border); overflow:hidden; margin-top:10px;}
  .progress-fill{height:100%; border-radius:6px; background:var(--accent); transition:width .5s ease;}

  .section-header{margin-bottom:14px;}
  .section-header h2{font-size:19px; margin:0; font-weight:700;}
  .section-header p{margin:2px 0 0; color:var(--ink-soft); font-size:12.5px;}

  .btn{
    border:none; border-radius:10px; padding:10px 16px; font-size:13.5px; font-weight:700;
    cursor:pointer; font-family:'Inter',sans-serif; display:inline-flex; align-items:center; gap:6px;
    transition:opacity .15s ease, transform .1s ease;
  }
  .btn:active{transform:scale(.96);}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-ghost{background:var(--surface-2); color:var(--ink); border:1px solid var(--border);}
  .btn-danger{background:var(--coral-soft); color:var(--coral);}
  .btn-sm{padding:7px 12px; font-size:12.5px;}

  input, textarea, select{
    font-family:'Inter',sans-serif; font-size:14.5px; color:var(--ink);
    background:var(--surface-2); border:1px solid var(--border); border-radius:9px;
    padding:9px 11px; outline:none; width:100%;
  }
  input:focus, textarea:focus, select:focus{border-color:var(--accent);}

      {q:'Do you remember your dreams?', a:'Sometimes, though the details usually fade quickly after waking up.'},
      {q:'Do you often have interesting dreams?', a:'Occasionally, especially when I\u2019m stressed or excited about something.'},
      {q:'Do you think dreams have meaning?', a:'I\u2019m not entirely sure, but they can reflect what\u2019s on your mind.'}
    ]},
    {id:'p1-46', topic:'Memory', qas:[
      {q:'Do you have a good memory?', a:'It\u2019s decent for some things, but I forget small details easily.'},
      {q:'What kind of things do you find easy to remember?', a:'Faces and conversations, more than dates or numbers.'},
      {q:'Do you use anything to help you remember things?', a:'Yes, I rely heavily on notes and reminders on my phone.'}
    ]},
    {id:'p1-47', topic:'Spare time', qas:[
      {q:'What do you usually do in your spare time?', a:'I read, exercise, or spend time with friends.'},
      {q:'Do you have enough spare time?', a:'Not always, but I try to protect at least a little each week.'},
      {q:'Has the way you spend your spare time changed recently?', a:'Yes, I spend more of it on hobbies than I used to.'}
    ]},
    {id:'p1-48', topic:'Crowded places', qas:[
      {q:'Do you like crowded places?', a:'Not particularly \u2014 I prefer quieter environments.'},
      {q:'Is your city usually crowded?', a:'Yes, especially in the city centre during rush hour.'},
      {q:'How do you feel when you are in a crowded place?', a:'A little overwhelmed, so I try to avoid them when I can.'}

  part2: [

    {id:'p2-1', topic:'Place you\u2019d like to visit in free time', cue:'Describe a place you would like to visit in your free time. You should say: where it is, how you know about it, what you would do there, and explain why you want to visit it.', answer:'One place I\u2019d really like to visit is a small coastal town about two hours from where I live. I first heard about it from a friend who went there last summer and showed me some photos \u2014 the beaches looked incredibly clean and there were far fewer tourists than the more famous spots nearby. If I went, I\u2019d probably just spend a few days walking along the coast, trying the local seafood, and maybe renting a bike to explore the surrounding villages. I want to visit mainly because I need a break from city life, and this place seems like exactly the kind of quiet, low-key destination where I could properly relax without a packed itinerary.'},
    {id:'p2-2', topic:'Special cake', cue:'Describe a special cake you have eaten or made. You should say: what the cake was, when you had it, who made it, and explain why it was special.', answer:'The cake that stands out most for me was one my grandmother made for my eighteenth birthday. It was a simple vanilla sponge cake, nothing fancy in terms of design, but she\u2019d written a personal message on top in icing. She spent almost the whole day baking it, even though she wasn\u2019t used to modern ovens. What made it special wasn\u2019t really the taste, although it was delicious, but the effort behind it \u2014 she doesn\u2019t bake often anymore, so knowing she\u2019d gone to that trouble specifically for me meant a lot. It\u2019s the kind of memory that comes back to me every time I smell vanilla baking.'},
    {id:'p2-3', topic:'Tall building', cue:'Describe a tall building you have seen. You should say: where it is, what it looks like, what it is used for, and explain how you felt about it.', answer:'I\u2019d like to talk about a skyscraper I saw in the business district of a city I visited last year. It\u2019s an extremely tall glass building with a curved shape that reflects sunlight in a really striking way, especially at sunset. As far as I know, it\u2019s mainly used as office space for various companies, with a few floors reserved for a public viewing deck near the top. When I first saw it up close, I felt genuinely amazed \u2014 photos hadn\u2019t prepared me for how enormous it actually was. Standing at the base and looking up gave me a slightly dizzy feeling, and I remember thinking about how much engineering must go into keeping a structure like that stable.'},
    {id:'p2-4', topic:'Getting up early', cue:'Describe a time you had to get up very early. You should say: when this was, why you had to get up early, what you did, and explain how you felt about it.', answer:'This happened a few months ago when I had an early morning flight to catch. I had to wake up around four in the morning to get to the airport on time, which is much earlier than I\u2019m used to. After a quick shower and a rushed breakfast, I called a taxi and headed straight there. Honestly, I felt quite groggy for most of the morning, and I remember struggling to stay awake in the taxi. However, once I boarded the plane and watched the sunrise from the window, it actually felt worth it \u2014 there was something peaceful about being awake while the rest of the city was still asleep.'},
    {id:'p2-5', topic:'Person who loves to grow plants', cue:'Describe a person you know who loves growing plants. You should say: who this person is, what plants they grow, how they take care of them, and explain why you think they enjoy it.', answer:'The person I have in mind is my next-door neighbour, an older man who has turned his small balcony into what looks like a mini garden. He grows a mix of herbs, tomatoes, and a few flowering plants, and he\u2019s incredibly consistent about watering and pruning them every single morning. He even has a little notebook where he tracks which plants need more sunlight or fertiliser. I think he enjoys it mainly because it gives him a sense of purpose and routine, especially since he retired recently. Whenever I pass by, he\u2019s always happy to chat about his plants, and you can tell just from his tone how much satisfaction he gets from watching something grow because of his own care.'},
    {id:'p2-6', topic:'Childhood friend', cue:'Describe a friend you had during childhood. You should say: who this person was, how you met, what you did together, and explain why you remember this friendship.', answer:'I\u2019d like to talk about a friend I had in primary school named Sara. We met on our very first day of school because we were seated next to each other, and we quickly bonded over sharing similar taste in cartoons. Most afternoons after school we\u2019d play in the small park near our houses, or sometimes just sit around inventing silly games. I remember this friendship so clearly because it was one of the first genuine connections I had outside my family, and it taught me a lot about loyalty, since we stayed close even after she moved schools a few years later.'},
    {id:'p2-7', topic:'Plan you had to change', cue:'Describe a plan you had to change. You should say: what the plan was, why you had to change it, what you did instead, and explain how you felt about it.', answer:'Last year, I had planned a hiking trip with some friends for a long weekend, but just two days before we were due to leave, one of my close relatives had a minor medical emergency, so I had to stay behind and help. Instead of going on the trip, I spent the weekend at the hospital and then helping around the house afterwards. At first I felt quite disappointed, since I\u2019d been looking forward to it for weeks, but that feeling didn\u2019t last long once I realised how much more important it was to be there for my family. Looking back, I don\u2019t regret the decision at all.'},
    {id:'p2-8', topic:'Food for special occasions', cue:'Describe a food that people in your country eat on special occasions. You should say: what the food is, when it is eaten, how it is made, and explain why it is important.', answer:'A dish that comes to mind is a type of slow-cooked stew that\u2019s traditionally prepared for major family gatherings and religious holidays. It usually involves meat, a mix of vegetables, and a rich sauce that simmers for several hours, sometimes even overnight. Preparing it properly takes real skill, so it\u2019s often the older generation in the family who takes charge of the cooking. It\u2019s important because it\u2019s rarely made on ordinary days \u2014 the fact that it takes so much time and effort is exactly what makes it feel special, and it brings the whole family together in the kitchen and around the table.'},
    {id:'p2-9', topic:'Live sports event', cue:'Describe a sports event you watched live. You should say: what the event was, where you watched it, who you were with, and explain how you felt about it.', answer:'I once watched a local football derby live at the stadium with two of my closest friends. The atmosphere was honestly unlike anything I\u2019d experienced before \u2014 thousands of fans singing and chanting throughout the match. We arrived a couple of hours early to get good seats and soak up the pre-match energy. During the game itself, I felt a mix of excitement and nervousness, especially since the score stayed close until the final few minutes. When our team finally scored the winning goal, the whole stadium erupted, and that shared moment of celebration with strangers around us is something I still remember vividly.'},
    {id:'p2-10', topic:'Place you\u2019d recommend', cue:'Describe a place you have travelled to that you would recommend to others. You should say: where it is, when you went there, what you did there, and explain why you would recommend it.', answer:'I\u2019d recommend a mountain town I visited two summers ago. I went there with my family for about a week, and we spent most of our time hiking various trails, visiting a nearby waterfall, and trying local dishes at small family-run restaurants. What made it stand out was how untouched it felt compared to more commercial tourist destinations \u2014 the scenery was stunning and the local people were incredibly welcoming. I\u2019d recommend it to anyone who wants a relaxing, nature-focused trip rather than a busy city break, especially if they enjoy outdoor activities and quieter surroundings.'},
    {id:'p2-11', topic:'Important decision', cue:'Describe an important decision you made. You should say: what the decision was, when you made it, why it was important, and explain how you felt about it.', answer:'One important decision I made was choosing to study abroad rather than staying in my home country for university. I made this decision about two years ago after a lot of research and conversations with my family. It was important because it would shape not just my education but where I\u2019d be living for several years, and it meant leaving behind close friends and a familiar environment. At the time, I felt quite anxious about the uncertainty, but also genuinely excited about the opportunities it could open up. Looking back now, I\u2019m confident it was the right choice, even though it wasn\u2019t an easy one to make.'},
    {id:'p2-12', topic:'Teamwork', cue:'Describe a time you worked as part of a team. You should say: what the task was, who was in the team, what your role was, and explain how successful the teamwork was.', answer:'A clear example is a group project I worked on during my studies, where four of us had to research and present findings on a specific topic within a tight deadline. I was mainly responsible for organising our research and putting together the final presentation slides, while the others focused on data collection and analysis. Communication wasn\u2019t always smooth at first, since we had different working styles, but we eventually settled into a routine of quick daily check-ins. In the end, the teamwork turned out to be quite successful \u2014 we received positive feedback, and I learned a lot about compromise and dividing tasks based on individual strengths.'},
    {id:'p2-13', topic:'Successful business person', cue:'Describe a successful business person you know or admire. You should say: who this person is, how they became successful, what qualities they have, and explain why you admire them.', answer:'The person I\u2019d like to describe is a distant relative of mine who started a small clothing business almost fifteen years ago and has since grown it into a well-known local brand. She became successful mainly through persistence \u2014 the first few years were financially difficult, but she kept refining her designs and building relationships with customers rather than giving up. What stands out most about her is her work ethic and willingness to take calculated risks. I admire her because she built everything from very little, and she still remains humble and approachable despite her success, which I think is genuinely rare.'},
    {id:'p2-14', topic:'Home you like but wouldn\u2019t live in', cue:'Describe a home you liked but would not want to live in. You should say: where it was, what it looked like, whose home it was, and explain why you would not want to live there.', answer:'I visited a friend\u2019s countryside house a while ago that I found beautiful, but wouldn\u2019t personally want to live in. It was a large traditional stone house surrounded by fields, with a wonderfully rustic interior and huge windows overlooking the countryside. It belonged to my friend\u2019s parents, who had lived there for decades. As lovely as it was, I wouldn\u2019t want to live there myself mainly because of the isolation \u2014 the nearest shop was almost thirty minutes away by car, and I\u2019m simply too used to city conveniences like nearby cafes and easy public transport to give that up permanently.'},
    {id:'p2-15', topic:'Important river', cue:'Describe an important river in your country. You should say: where it is, how long it is, what it is used for, and explain why it is important.', answer:'The river I\u2019d like to talk about runs through the central region of my country and is one of the longest rivers here, stretching several hundred kilometres. It\u2019s used for a variety of purposes, including irrigation for farmland, transportation of goods in some sections, and it also supplies drinking water to a number of towns along its route. It\u2019s important not just economically but historically too, since several major cities developed along its banks centuries ago. Without it, a significant part of the country\u2019s agriculture would struggle, which is why there\u2019s ongoing concern about pollution levels affecting it.'},
    {id:'p2-16', topic:'Learning a language', cue:'Describe something you did to help you learn a language. You should say: what you did, when you did it, how it helped you, and explain how you felt about the results.', answer:'A few years ago, I decided to watch films and TV series in English with subtitles instead of dubbed into my own language. I did this fairly consistently for about a year, alongside my regular classes. It helped enormously with listening skills in particular, since I got used to hearing natural speed and different accents rather than the slower, clearer speech used in textbooks. I felt genuinely proud of the improvement, especially when I noticed I could understand conversations without needing subtitles as often. It\u2019s a method I\u2019d recommend to anyone who finds traditional classroom learning a bit dry.'}
  ,

    {id:'p2-17', topic:'Environmental law', cue:'Describe an environmental law in your country. You should say: what the law is, when it was introduced, how it affects people, and explain whether you think it is effective.', answer:'A law that comes to mind is one restricting the use of single-use plastic bags in shops, which was introduced a few years ago in my country. Under this law, retailers either have to charge customers for plastic bags or offer reusable alternatives instead. It\u2019s affected people\u2019s daily habits quite noticeably \u2014 most people now carry their own bags when shopping, something that was uncommon before. As for its effectiveness, I\u2019d say it\u2019s been reasonably successful, since plastic waste in public areas has visibly decreased, although enforcement in smaller local shops is still somewhat inconsistent.'},
    {id:'p2-18', topic:'Inexpensive special day out', cue:'Describe a special day out that did not cost much money. You should say: where you went, who you went with, what you did, and explain why it was special.', answer:'One day that stands out was a simple picnic I organised with a few close friends at a public park near a lake. We didn\u2019t spend much at all \u2014 just some homemade sandwiches and snacks we brought from home. We spent hours just talking, playing simple games, and occasionally walking along the lake. What made the day special wasn\u2019t the activities themselves, which were fairly ordinary, but the relaxed atmosphere and how much we laughed together without any pressure or planning. It reminded me that memorable days don\u2019t need to be expensive to feel meaningful.'},
    {id:'p2-19', topic:'Organizing a happy event', cue:'Describe a happy event you helped organize. You should say: what the event was, who it was for, what you did to organize it, and explain how you felt afterwards.', answer:'I helped organise a surprise birthday party for my sister\u2019s thirtieth birthday last year. Along with a couple of her close friends, I was responsible for coordinating the venue, sending out invitations secretly, and arranging decorations and food. It took a fair amount of planning over about two weeks, and keeping it a secret from her was honestly the hardest part. When the day finally came and she walked in completely surprised, her reaction made all the effort worthwhile. Afterwards, I felt a real sense of satisfaction, both because the event went smoothly and because I could see how much it meant to her.'},
    {id:'p2-20', topic:'Traffic jam', cue:'Describe a time you were stuck in a traffic jam. You should say: when it happened, where you were going, how long it lasted, and explain how you felt.', answer:'This happened last year when I was heading to an important job interview across town during rush hour. What should have been a thirty-minute drive turned into almost two hours because of an accident further up the road. As the minutes ticked by, I felt increasingly anxious, constantly checking the time and calculating whether I\u2019d still make it. I ended up calling ahead to explain the situation, which thankfully the interviewer understood. Since then, I always try to leave much earlier than necessary for anything important, just to avoid that same stressful experience again.'},
    {id:'p2-21', topic:'Long-term goal', cue:'Describe a long-term goal you have. You should say: what the goal is, how you plan to achieve it, how long it will take, and explain why this goal is important to you.', answer:'One long-term goal of mine is to become fully qualified and established in my chosen profession, ideally within the next five to six years. My plan involves finishing my current studies, gaining practical experience through internships, and eventually pursuing further certification in my field. It\u2019s a gradual process that requires patience, since each stage builds on the previous one. This goal matters to me because it\u2019s not just about having a stable career, but about reaching a point where I feel genuinely confident and skilled in work that I find meaningful.'},
    {id:'p2-22', topic:'Person who overcame difficulties', cue:'Describe a person who faced difficulties but succeeded. You should say: who this person is, what difficulties they faced, how they overcame them, and explain how you feel about their achievement.', answer:'I\u2019d like to talk about a cousin of mine who faced significant financial difficulties while trying to complete her university degree. Her family couldn\u2019t fully support her studies, so she had to work part-time jobs alongside her coursework for several years, which was exhausting both physically and mentally. She overcame this through sheer determination, careful time management, and occasionally taking on scholarships when available. Eventually, she graduated with excellent grades despite everything working against her. I feel genuinely inspired by her story, since it shows that circumstances don\u2019t have to determine the outcome if someone is determined enough.'},
    {id:'p2-23', topic:'Technological problem', cue:'Describe a technological problem you experienced. You should say: what the problem was, when it happened, how you solved it, and explain how it affected you.', answer:'A memorable technological problem I faced was when my laptop crashed right before an important deadline, and I lost access to a document I\u2019d been working on for days. This happened during a particularly busy exam period, so the timing couldn\u2019t have been worse. I eventually managed to recover most of the file using a backup service I hadn\u2019t realised was still running in the background, though I did lose the most recent changes. The experience affected me quite a bit at the time, causing real panic, but it also taught me to save my work far more frequently and use cloud backups from then on.'},
    {id:'p2-24', topic:'Person who helped solve a problem', cue:'Describe a person who helped you solve a problem. You should say: who this person is, what the problem was, how they helped you, and explain how you felt about their help.', answer:'The person I have in mind is a close friend who helped me when I was struggling to understand a difficult subject during my studies. I was falling behind and getting increasingly frustrated, so she offered to go through the material with me over several evenings, explaining concepts in a way that finally made sense. She was incredibly patient, even when I asked the same questions repeatedly. Thanks to her help, I ended up passing that module with a much better grade than I expected. I felt genuinely grateful, and it strengthened our friendship, since she gave up her own free time purely to help me.'},
    {id:'p2-25', topic:'Changing an opinion', cue:'Describe a time you changed your opinion about something. You should say: what the opinion was, why you changed it, what caused the change, and explain how you feel about it now.', answer:'I used to believe that working from home was far less productive than working in an office, mainly because I assumed people would get easily distracted. This opinion changed after I experienced remote work myself for an extended period and realised I could actually manage my time more effectively without commuting or unnecessary office interruptions. Seeing colleagues maintain, or even improve, their output also challenged my original assumption. Now I feel much more open-minded about flexible working arrangements, and I think my earlier opinion was based more on stereotype than actual experience.'},
    {id:'p2-26', topic:'Message or email', cue:'Describe an important message or email you received. You should say: who sent it, what it was about, when you received it, and explain why it was important.', answer:'An important email I received was an acceptance letter from a university I had applied to, which arrived after months of anxious waiting. It came directly from the admissions department, confirming that I\u2019d been offered a place on the course I really wanted. I remember reading it several times just to make sure I understood it correctly. It was important because it represented the outcome of years of hard work and effectively decided the next few years of my life. I still remember exactly where I was sitting when I opened it, which shows how significant that moment was for me.'},
    {id:'p2-27', topic:'Ad with a famous person', cue:'Describe an advertisement featuring a famous person. You should say: what the product was, who the famous person was, where you saw it, and explain whether you think it was effective.', answer:'I remember seeing a television advertisement for a sports brand featuring a well-known athlete, promoting a new line of running shoes. I saw it during a televised sports event, which felt like a fitting placement given the audience. The advert focused heavily on the athlete\u2019s personal training routine and discipline, linking that image directly to the product. I\u2019d say it was fairly effective, at least for me, since it made the shoes feel associated with genuine performance rather than just style. That said, I do think such adverts work better on people who already admire that particular celebrity.'},
    {id:'p2-28', topic:'Boring place', cue:'Describe a place you found boring. You should say: where it was, when you went there, what you did there, and explain why you found it boring.', answer:'A place I found particularly boring was a large shopping mall I visited with relatives a couple of years ago. We spent almost an entire afternoon there, mostly walking between shops while they browsed items I had no interest in. There wasn\u2019t much for me to actually do besides wait around, since I\u2019m not particularly fond of shopping as an activity. The repetitive layout of similar shops and the lack of anything engaging made the hours drag on. Looking back, I think it was boring mainly because the visit wasn\u2019t suited to my own interests at all.'},
    {id:'p2-29', topic:'Interesting video', cue:'Describe an interesting video you watched online. You should say: what it was about, where you found it, when you watched it, and explain why you found it interesting.', answer:'I recently watched a documentary-style video about how everyday products are manufactured, which I stumbled across while browsing recommendations online. It walked through the entire production process of something as simple as a pencil, from raw materials to the finished item. I watched it late one evening when I wasn\u2019t particularly looking for anything specific, and ended up completely absorbed. I found it interesting because it revealed just how much complexity and effort goes into things we normally take for granted, and it genuinely changed how I look at ordinary objects now.'},
    {id:'p2-30', topic:'Story or book with animals', cue:'Describe a story or book that included animals. You should say: what it was about, who the main animal characters were, when you read or heard it, and explain why you remember it.', answer:'A book that comes to mind is one I read as a child about a dog that gets separated from its family and has to find its way home across a long distance. The main character was the dog itself, portrayed with surprisingly relatable emotions throughout the story. I read it when I was around ten years old, borrowed from my school library. I remember it clearly because it was one of the first books that genuinely made me cry, and it taught me early on how powerful storytelling can be, even with a fairly simple animal-centred plot.'},
    {id:'p2-31', topic:'Person who wants to work in medicine', cue:'Describe a person you know who wants to work in the medical field. You should say: who this person is, why they want this career, what they are doing to prepare, and explain how you feel about their choice.', answer:'I\u2019d like to describe a close friend of mine who has wanted to become a doctor for as long as I\u2019ve known her. She became interested in medicine after a family member had a serious illness, which made her want to help others in similar situations. She\u2019s currently studying extremely hard, attending extra science classes, and volunteering at a local clinic to gain practical exposure. I feel genuinely supportive of her choice, since it clearly comes from a meaningful personal experience rather than just prestige, and I have no doubt she\u2019ll make an excellent doctor given how dedicated she already is.'},
    {id:'p2-32', topic:'Person who works at a successful company', cue:'Describe a person you know who works at a successful company. You should say: who this person is, what the company does, what their role is, and explain why you think the company is successful.', answer:'The person I have in mind is an old university classmate who now works at a well-established technology company known for its software products. Her role involves managing communication between different teams to ensure projects stay on schedule. From what she\u2019s told me, the company\u2019s success comes largely from its strong internal culture, which encourages employees to share ideas openly rather than sticking rigidly to hierarchy. It also invests heavily in training new staff, which seems to keep both productivity and morale high. Hearing her describe the workplace makes it clear why the company continues to grow steadily.'}
  
  ],
  part3: [

    {id:'p3-1', topic:'Travelling and rest', qas:[
      {q:'Why do people need to take breaks from work or study?', a:'Continuous work without breaks tends to reduce concentration and increase mistakes, so short periods of rest actually help people stay productive rather than hinder it.'},
      {q:'Do you think people today get enough rest compared to the past?', a:'I\u2019d say no \u2014 constant connectivity through phones and emails means many people find it harder to fully switch off, even during supposed rest time.'}
    ]},
    {id:'p3-2', topic:'Food and cooking', qas:[
      {q:'Why do some people enjoy cooking while others do not?', a:'It often comes down to whether someone sees cooking as a creative outlet or simply a time-consuming chore, which usually depends on how they were raised.'},
      {q:'How has the way people cook changed over the past few decades?', a:'Convenience has become a much bigger priority, with more people relying on pre-prepared ingredients and quick recipes due to busier lifestyles.'}
    ]},
    {id:'p3-3', topic:'Tall buildings', qas:[
      {q:'Why do cities build very tall buildings?', a:'Mainly because land in city centres is limited and expensive, so building upwards allows more space to be used efficiently.'},
      {q:'What are the advantages and disadvantages of living in a tall building?', a:'Advantages include great views and often better security, while disadvantages can include reliance on lifts and a lack of connection to street-level community life.'}
    ]},
    {id:'p3-4', topic:'Getting up early', qas:[
      {q:'Do you think successful people usually get up early?', a:'Many do, though I think it\u2019s more about having a consistent routine overall rather than the specific time itself.'},
      {q:'How does getting up early affect a person\u2019s productivity?', a:'It can provide quiet, uninterrupted time to focus before the demands of the day begin, which many people find valuable.'}
    ]},
    {id:'p3-5', topic:'Rules and laws', qas:[
      {q:'Why are rules necessary in society?', a:'Without shared rules, it would be very difficult to maintain order or protect people\u2019s basic rights and safety.'},
      {q:'Do you think rules should be the same for everyone?', a:'In principle yes, since fairness depends on consistent application, although context sometimes needs to be considered in how rules are enforced.'}
    ]},
    {id:'p3-6', topic:'Growing plants', qas:[
      {q:'Why do you think gardening has become popular in some countries?', a:'It offers a calming escape from busy urban lifestyles, and growing something tangible feels rewarding in a world that\u2019s increasingly digital.'},
      {q:'What are the benefits of growing your own food?', a:'Beyond the health benefits of fresher produce, it also gives people a better understanding of where their food actually comes from.'}
    ]},
    {id:'p3-7', topic:'Friendship and social media', qas:[
      {q:'How has social media changed the way people make friends?', a:'It\u2019s made it much easier to connect with people who share niche interests, regardless of geographic distance.'},
      {q:'Do you think online friendships are as strong as offline ones?', a:'They can be meaningful, but I think physical presence still adds a depth to relationships that\u2019s hard to fully replicate online.'}
    ]},
    {id:'p3-8', topic:'Planning', qas:[
      {q:'Why do some people plan things carefully while others do not?', a:'It often relates to personality and how comfortable someone is with uncertainty \u2014 some people find spontaneity exciting rather than stressful.'},
      {q:'Do you think planning too much can be a disadvantage?', a:'Yes, over-planning can sometimes make people inflexible when circumstances inevitably change.'}
    ]},
    {id:'p3-9', topic:'Food', qas:[
      {q:'How have people\u2019s eating habits changed in recent years?', a:'There\u2019s been a noticeable shift towards convenience foods, though also a growing counter-trend of interest in healthier, more natural diets.'},
      {q:'Do you think fast food has had a negative effect on society?', a:'To some extent, particularly regarding public health, though it\u2019s also made food more accessible and affordable for many people.'}
    ]},
    {id:'p3-10', topic:'Sport events and competition', qas:[
      {q:'Why do people enjoy watching sports competitions?', a:'The unpredictability and shared emotional experience of watching a close match creates excitement that\u2019s hard to find elsewhere.'},
      {q:'Do you think competition brings out the best in people?', a:'Often, yes, since it can motivate people to improve, though excessive competitiveness can sometimes bring out negative behaviour too.'}
    ]},
    {id:'p3-11', topic:'Holidays', qas:[
      {q:'Why do people need holidays?', a:'They provide a necessary break from routine stress, allowing people to return to work feeling refreshed rather than burnt out.'},
      {q:'Do you think the way people spend holidays has changed over time?', a:'Yes, holidays have become more experience-focused, with people often prioritising unique activities over simply relaxing.'}
    ]},
    {id:'p3-12', topic:'Making decisions', qas:[
      {q:'Do you think it is better to make decisions quickly or slowly?', a:'It depends on the stakes involved \u2014 minor decisions benefit from speed, while significant ones usually deserve more careful thought.'},
      {q:'How does experience affect the way people make decisions?', a:'Experience helps people recognise patterns and likely outcomes, which generally leads to more confident and accurate decision-making over time.'}
    ]},
    {id:'p3-13', topic:'Teamwork and leadership', qas:[
      {q:'What qualities make a good leader?', a:'Good communication and the ability to listen to team members are just as important as having a clear vision.'},
      {q:'Do you think teamwork skills can be taught?', a:'Yes, largely through practice and experience working alongside others, rather than purely through theoretical instruction.'}
    ]},
    {id:'p3-14', topic:'Success in business', qas:[
      {q:'What factors help a business become successful?', a:'A clear understanding of customer needs combined with adaptability tends to matter more than the initial idea itself.'},
      {q:'Do you think luck plays a role in business success?', a:'To some degree, yes, though I\u2019d argue that preparation often determines whether someone can actually take advantage of lucky opportunities.'}

function deepMerge(base, incoming){
  if (Array.isArray(base)) return incoming !== undefined ? incoming : base;
  if (typeof base === 'object' && base !== null){
    const out = {...base};
    if (incoming && typeof incoming === 'object'){
      Object.keys(base).forEach(k => { out[k] = deepMerge(base[k], incoming[k]); });
    }
    return out;
  }
  return incoming !== undefined ? incoming : base;
}

// Storage works two ways: window.storage (available inside Claude artifacts) or
// localStorage (available once this file is hosted anywhere else, e.g. Netlify).
// This lets the exact same file work both inside Claude and as a standalone site.
const hasClaudeStorage = typeof window.storage !== 'undefined';

async function storageGet(key){
  if (hasClaudeStorage){
    try { return await window.storage.get(key); } catch(e){ return null; }
  }
  try {
    const v = localStorage.getItem(key);
    return v !== null ? { key, value: v } : null;
  } catch(e){ return null; }
}
async function storageSet(key, value){
  if (hasClaudeStorage){
    try { return await window.storage.set(key, value); } catch(e){ console.error('save failed', e); return null; }
  }
  try { localStorage.setItem(key, value); return { key, value }; } catch(e){ console.error('save failed', e); return null; }
}

async function saveState(){
  await storageSet(STORAGE_KEY, JSON.stringify(state));
}
const debouncedSave = debounce(saveState, 400);

async function loadState(){
  try{
    const res = await storageGet(STORAGE_KEY);
    if (res && res.value){
      const parsed = JSON.parse(res.value);
      state = deepMerge(defaultState(), parsed);
    }
  }catch(e){ /* first run, nothing saved yet */ }
}

function debounce(fn, wait){
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
}

function setPath(obj, path, value){
  const keys = path.split('.');
  let cur = obj;
  for (let i=0;i<keys.length-1;i++) cur = cur[keys[i]];
  cur[keys[keys.length-1]] = value;
}
function getPath(obj, path){
  return path.split('.').reduce((c,k)=> (c==null?undefined:c[k]), obj);
}

// ===================== HELPERS =====================
function overallBand(){
  const b = state.bands;
  const avg = (b.listening + b.reading + b.writing + b.speaking) / 4;
  return Math.round(avg * 2) / 2;
}
function fmtBand(n){ return Number(n).toFixed(1); }

function arcPath(cx, cy, r, pct, colorVar){
  const circumference = 2 * Math.PI * r;
  const dash = Math.max(0, Math.min(1, pct)) * circumference;
  return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(${colorVar})" stroke-width="9"
    stroke-linecap="round" stroke-dasharray="${dash} ${circumference}"
    transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dasharray .6s ease"/>`;
}

function updateStreakChip(){
  document.getElementById('topStreak').textContent = state.streak.current;
}

function markStudiedToday(){
  const last = state.streak.lastDate;
  const today = todayStr();
  if (last === today) return; // already logged
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (last === yesterday) state.streak.current += 1;
  else state.streak.current = 1;
  state.streak.longest = Math.max(state.streak.longest, state.streak.current);
  state.streak.lastDate = today;
  debouncedSave();
  updateStreakChip();
}

function findBankItem(id){
  for (const kind of ['part1','part2','part3']){
    const found = SPEAKING_BANK[kind].find(x=>x.id===id);

  }
  return null;
}
const PART_LABELS = { part1:'Part 1', part2:'Part 2', part3:'Part 3' };

function renderSpeakingBankTab(){
  const bp = state.speaking.bankProgress || {};
  ui.bankAnswerShown = ui.bankAnswerShown || {};

  if (ui.bankDetailId){
    const found = findBankItem(ui.bankDetailId);
    if (found) return renderBankDetail(found.item, found.kind, bp);
    ui.bankDetailId = null;
  }

  const filterPart = ui.speakingBankFilter || 'all';
  const query = (ui.speakingBankQuery || '').toLowerCase();
  const matches = (topic) => !query || topic.toLowerCase().includes(query);

  const part1 = filterPart==='all' || filterPart==='part1' ? SPEAKING_BANK.part1.filter(t=>matches(t.topic)) : [];
  const part2 = filterPart==='all' || filterPart==='part2' ? SPEAKING_BANK.part2.filter(t=>matches(t.topic)) : [];
  const part3 = filterPart==='all' || filterPart==='part3' ? SPEAKING_BANK.part3.filter(t=>matches(t.topic)) : [];
  const totalShown = part1.length + part2.length + part3.length;
  const totalPracticed = Object.values(bp).filter(x=>x && x.practiced).length;
  const totalTopics = SPEAKING_BANK.part1.length + SPEAKING_BANK.part2.length + SPEAKING_BANK.part3.length;

  function row(item, kind){
    const prog = bp[item.id] || {};
    const qCount = item.qas ? item.qas.length : 1;
    const qLabel = item.qas ? `${qCount} Q${qCount===1?'':'s'}` : 'Cue card';
    return `
    <div class="card tight bank-row ${prog.practiced?'bank-row-done':''}" data-bank-id="${item.id}" data-bank-kind="${kind}" style="margin-bottom:8px;">
      <div class="bank-card-header" data-bank-open="${item.id}" style="display:flex; align-items:center; justify-content:space-between; gap:8px;">
        <div style="display:flex; align-items:center; gap:7px; flex:1; min-width:0;">
          <span style="color:var(--ink-faint); font-size:12px; flex-shrink:0;">›</span>
          <span style="font-weight:700; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${escapeHtml(item.topic)}</span>
        </div>
        <div style="display:flex; align-items:center; gap:8px; flex-shrink:0;">
          <span class="pill pill-todo" style="white-space:nowrap;">${qLabel}</span>
          <label style="display:flex; flex-direction:column; align-items:center; gap:1px;" data-stop-toggle="1">
            <input type="checkbox" class="bank-practiced-check" ${prog.practiced?'checked':''} style="width:17px; height:17px; accent-color:var(--teal);">
            <span style="font-size:8.5px; color:var(--ink-soft);">Done</span>
          </label>
        </div>
      </div>
    </div>`;
  }

  return `
  <div class="card tight" style="margin-bottom:12px;">
    <input type="text" id="speakingBankSearch" placeholder="Search topics..." value="${escapeAttr(ui.speakingBankQuery||'')}" style="margin-bottom:10px;">
    <div class="filter-row" style="margin:0;">
      <div class="chip-filter ${filterPart==='all'?'active':''}" data-bankfilter="all">All</div>
      <div class="chip-filter ${filterPart==='part1'?'active':''}" data-bankfilter="part1">Part 1</div>
      <div class="chip-filter ${filterPart==='part2'?'active':''}" data-bankfilter="part2">Part 2</div>
      <div class="chip-filter ${filterPart==='part3'?'active':''}" data-bankfilter="part3">Part 3</div>
    </div>
  </div>
  <div class="stat-sub" style="margin-bottom:12px;">${SPEAKING_BANK.rotation} · ${totalPracticed}/${totalTopics} practiced · tap a topic to open</div>

  ${part1.length ? `<div class="card-title" style="margin-top:4px;">🟢 Part 1</div>${part1.map(t=>row(t,'part1')).join('')}` : ''}
  ${part2.length ? `<div class="card-title" style="margin-top:16px;">🟣 Part 2 — Cue Cards</div>${part2.map(t=>row(t,'part2')).join('')}` : ''}
  ${part3.length ? `<div class="card-title" style="margin-top:16px;">🟠 Part 3</div>${part3.map(t=>row(t,'part3')).join('')}` : ''}
  ${totalShown===0 ? `<div class="empty-hint">No topics match your search.</div>` : ''}
  `;
}

function renderBankDetail(item, kind, bp){
  const prog = bp[item.id] || {};
  let body = '';
  if (kind === 'part2'){
    const key = `${item.id}-0`;
    const shown = !!ui.bankAnswerShown[key];
    body = `
    <div class="card" style="margin-bottom:12px;">
      <div style="font-size:13.5px; font-weight:600; line-height:1.55;">${escapeHtml(item.cue)}</div>
      <div class="bank-answer-toggle" data-answer-toggle="${key}" style="margin-top:9px; font-size:12px; font-weight:600; color:var(--accent);">
        ${shown ? 'Hide model answer ▲' : 'Show model answer ▼'}
      </div>
      ${shown ? `<div style="margin-top:7px; font-size:12.5px; line-height:1.6; background:var(--accent-soft); border-radius:9px; padding:11px 12px;">${escapeHtml(item.answer)}</div>` : ''}
    </div>`;
  } else {
    body = item.qas.map((qa,i) => {
      const key = `${item.id}-${i}`;

function lineChartSvg(hist){
  const W = 780, H = 220, pad = 34;
  const sorted = [...hist].sort((a,b)=> new Date(a.date) - new Date(b.date));
  const n = sorted.length;
  const xStep = (W - pad*2) / Math.max(1,n-1);
  const yFor = (band) => H - pad - ((band-4)/5)*(H-pad*2);
  const xFor = (i) => pad + i*xStep;

  const series = [
    { key:'listening', color:'var(--accent)' },
    { key:'reading', color:'var(--teal)' },
    { key:'writing', color:'var(--amber)' },
    { key:'speaking', color:'var(--violet)' }
  ];

  const gridLines = [4,5,6,7,8,9].map(v => `
    <line x1="${pad}" y1="${yFor(v)}" x2="${W-pad}" y2="${yFor(v)}" stroke="var(--border)" stroke-width="1"/>
    <text x="${pad-8}" y="${yFor(v)+4}" text-anchor="end" font-family="IBM Plex Mono" font-size="10" fill="var(--ink-faint)">${v}</text>`).join('');

  const paths = series.map(s => {
    const pts = sorted.map((h,i) => `${xFor(i)},${yFor(h[s.key]||4)}`).join(' ');
    const dots = sorted.map((h,i) => `<circle cx="${xFor(i)}" cy="${yFor(h[s.key]||4)}" r="3.5" fill="${s.color}"/>`).join('');
    return `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${dots}`;
  }).join('');

  const xLabels = sorted.map((h,i) => `<text x="${xFor(i)}" y="${H-8}" text-anchor="middle" font-family="IBM Plex Mono" font-size="9.5" fill="var(--ink-faint)">${(h.date||'').slice(5)}</text>`).join('');

  const legend = `<div style="display:flex; gap:16px; margin-top:10px; flex-wrap:wrap;">
    ${series.map(s=>`<div style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-soft);"><span style="width:10px;height:10px;border-radius:50%;background:${s.color};"></span>${s.key[0].toUpperCase()+s.key.slice(1)}</div>`).join('')}
  </div>`;

  return `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${gridLines}${paths}${xLabels}</svg>${legend}`;
}

  <div class="card" style="margin-bottom:14px;">
    <div class="card-title">What This App Does</div>
    <p style="font-size:13.5px; line-height:1.6; margin:0 0 12px;">
      Everything for your IELTS journey lives in one place, instead of scattered across notes and spreadsheets.
      It's built around one idea: Band 8 comes from <strong>diagnosing and fixing recurring mistakes</strong>,
      not just doing more practice tests.
    </p>
    <ul style="font-size:13.5px; line-height:1.8; margin:0; padding-left:18px;">
      <li>Tracks your <strong>band score</strong> for all 4 skills vs. your Band 8 target</li>
      <li>Logs every <strong>practice session</strong> so mistake patterns become visible</li>
      <li>Searchable <strong>Vocabulary</strong> and <strong>Grammar</strong> banks</li>
      <li>Cross-skill <strong>Mistake Database</strong> so errors get fixed once</li>
      <li><strong>Daily/weekly/monthly</strong> planning in one place</li>
      <li><strong>Progress</strong> charts so you can see the climb over time</li>
      <li>Saves automatically and privately — no sign-up, no external server</li>
    </ul>

function bindHistoryTable(skill, containerId, arr, extraFieldMap){
  document.querySelectorAll(`#${containerId} tr[data-id]`).forEach(tr => {
    const id = tr.dataset.id;
    const row = rowState(arr, id);
    if (!row) return;
    Object.keys(extraFieldMap).forEach(cls => {
      const el = tr.querySelector('.'+cls);
      if (el) el.addEventListener(el.tagName==='SELECT' || el.type==='date' ? 'change':'input', debounce(e => {
        row[extraFieldMap[cls]] = e.target.value; debouncedSave();
      }, 300));
    });
  });
}

function togglePracticed(id, kind, checked){
  const bp = state.speaking.bankProgress;
  if (!bp[id]) bp[id] = { practiced:false, note:'', loggedId:null };
  const prog = bp[id];
  prog.practiced = checked;
  const found = findBankItem(id);
  if (checked){
    if (!prog.loggedId && found){
      const entry = { id: uid(), date: todayStr(), part: PART_LABELS[kind], topic: found.item.topic, band:'', note:'Marked practiced in Question Bank' };
      state.speaking.log.unshift(entry);
      prog.loggedId = entry.id;
    }
  } else {
    if (prog.loggedId){
      state.speaking.log = state.speaking.log.filter(l => l.id !== prog.loggedId);
      prog.loggedId = null;
    }
  }
  debouncedSave();
  render();
}

  });

    debouncedSave();
  }, 300));
}

function render(){

    home: renderHome, resources: renderResources, listening: () => renderSkillLog('listening'),
    reading: renderReading, writing: renderWriting, speaking: renderSpeaking,
    vocabulary: renderVocabulary, grammar: renderGrammar, progress: renderProgress,
    mistakes: renderMistakes, planner: renderPlanner, settings: renderSettings,
    moreMenu: renderMoreMenu, about: renderAbout
  };
  const group = GROUPS[ui.activeSection];
  let subnav = '';
  if (group === 'practice') subnav = subTabsHtml(['listening','reading','writing','speaking'], ui.activeSection);
  else if (group === 'vocab') subnav = subTabsHtml(['vocabulary','grammar'], ui.activeSection);
  else if (group === 'more' && ui.activeSection !== 'moreMenu') subnav = backBarHtml();

  document.getElementById('pageTitle').textContent = ui.activeSection === 'moreMenu' ? 'More' : SECTION_TITLES[ui.activeSection];
  c.innerHTML = `<div class="section">${subnav}${renderers[ui.activeSection]()}</div>`;
  bindSection(ui.activeSection);

  updateBottomNavActive();
  updateStreakChip();
}

let tourIdx = 0;

function renderTourStep(){
  const step = TOUR_STEPS[tourIdx];
  const card = document.getElementById('tourCard');
  const isLast = tourIdx === TOUR_STEPS.length - 1;
  const isFirst = tourIdx === 0;
  card.innerHTML = `
    <div class="tour-icon">${step.icon}</div>
    <h3>${step.title}</h3>
    <p>${step.body}</p>
    <div class="tour-dots">${TOUR_STEPS.map((_,i)=>`<div class="tour-dot ${i===tourIdx?'active':''}"></div>`).join('')}</div>
    <div class="tour-nav">
      <button class="tour-skip" id="tourSkipBtn">${isLast?'':'Skip'}</button>
      <div class="tour-btns">
        ${!isFirst ? `<button class="btn btn-ghost btn-sm" id="tourBackBtn">Back</button>` : ''}
        <button class="btn btn-primary btn-sm" id="tourNextBtn">${isLast?'Get started':'Next'}</button>
      </div>
    </div>`;
  document.getElementById('tourNextBtn').addEventListener('click', () => {
    if (isLast) closeTour(); else { tourIdx++; renderTourStep(); }
  });
  if (!isFirst) document.getElementById('tourBackBtn').addEventListener('click', () => { tourIdx--; renderTourStep(); });
  if (!isLast) document.getElementById('tourSkipBtn').addEventListener('click', closeTour);
}

function showTour(){
  tourIdx = 0;
  document.getElementById('tourOverlay').style.display = 'flex';
  renderTourStep();
}
function closeTour(){
  document.getElementById('tourOverlay').style.display = 'none';
  state.hasSeenTour = true;
  debouncedSave();
}

async function init(){
  await loadState();
  applyTheme();
  updateStreakChip();

  document.querySelectorAll('.bottom-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const key = tab.dataset.tabkey;
      if (key === 'home') ui.activeSection = 'home';
      else if (key === 'progress') ui.activeSection = 'progress';
      else if (key === 'more') ui.activeSection = 'moreMenu';
      else ui.activeSection = ui.lastInGroup[key];
      render();
    });
  });

  document.getElementById('themeToggle').addEventListener('click', () => {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    applyTheme(); debouncedSave();
    if (ui.activeSection === 'settings') render();
  });

  render();
  if (!state.hasSeenTour) showTour();
}

init();

</script>
</body>
</html>
