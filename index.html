<title>Band 8 Command Center — Mobile</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --bg:#F5F6FA; --surface:#FFFFFF; --surface-2:#FAFBFD;
    --ink:#15182B; --ink-soft:#6B7180; --ink-faint:#9AA0AE;
    --border:#E6E8F0;
    --accent:#4C5FD7; --accent-soft:#EBEDFB; --accent-dim:#DEE1F8;
    --teal:#17A398; --teal-soft:#E4F5F3;
    --amber:#E8A93A; --amber-soft:#FCF1DD;
    --violet:#9B5DE5; --violet-soft:#F1E8FC;
    --coral:#E2574C; --coral-soft:#FBEAE8;
    --shadow: 0 1px 2px rgba(20,22,50,.04), 0 8px 24px rgba(20,22,50,.06);
    --radius: 16px; --radius-sm: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  [data-theme="dark"]{
    --bg:#0E1016; --surface:#171A24; --surface-2:#1D202C;
    --ink:#EEF0F6; --ink-soft:#9AA0B4; --ink-faint:#666C80;
    --border:#272B3A;
    --accent:#7C8CF8; --accent-soft:#232748; --accent-dim:#2A2F55;
    --teal:#3FCDBF; --teal-soft:#123430;
    --amber:#F0BB5C; --amber-soft:#3A2E14;
    --violet:#B583EF; --violet-soft:#2C1F42;
    --coral:#F1786D; --coral-soft:#3A1E1D;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.35);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
    transition:background .25s ease, color .25s ease;
  }
  h1,h2,h3{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  .app{display:flex; flex-direction:column; min-height:100vh;}

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:calc(12px + var(--safe-top)) 16px 12px;
    background:var(--surface); border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:10;
  }
  .topbar h1{font-size:17px; margin:0; font-weight:700;}
  .topbar-right{display:flex; align-items:center; gap:10px;}
  .streak-chip{
    display:flex; align-items:center; gap:5px; background:var(--amber-soft); color:var(--amber);
    padding:5px 10px; border-radius:20px; font-size:12px; font-weight:700;
  }
  .theme-toggle{
    width:34px; height:34px; border-radius:10px; border:1px solid var(--border);
    background:var(--surface-2); display:flex; align-items:center; justify-content:center;
    font-size:15px; cursor:pointer;
  }

  .content{
    flex:1; padding:16px 16px calc(90px + var(--safe-bottom));
    max-width:600px; margin:0 auto; width:100%;
  }
  .section{animation:fadeIn .25s ease;}
  @keyframes fadeIn{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

  /* Bottom tab bar */
  .bottom-nav{
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    display:flex; background:var(--surface); border-top:1px solid var(--border);
    padding:6px 4px calc(6px + var(--safe-bottom));
    box-shadow:0 -2px 12px rgba(20,22,50,.06);
  }
  .bottom-tab{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
    padding:6px 2px; border-radius:12px; color:var(--ink-faint); font-size:10.5px; font-weight:600;
    cursor:pointer; transition:color .15s ease, background .15s ease;
  }
  .bottom-tab .bt-icon{font-size:19px; line-height:1;}
  .bottom-tab.active{color:var(--accent); background:var(--accent-soft);}

  /* Sub navigation (segmented control for Practice / Vocab groups) */
  .subtabs{
    display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:16px;
    -webkit-overflow-scrolling:touch;
  }
  .subtabs::-webkit-scrollbar{display:none;}
  .subtab{
    flex-shrink:0; padding:8px 16px; border-radius:20px; font-size:13px; font-weight:600;
    background:var(--surface-2); border:1px solid var(--border); color:var(--ink-soft); cursor:pointer;
  }
  .subtab.active{background:var(--accent); color:#fff; border-color:var(--accent);}

  .back-bar{
    display:flex; align-items:center; gap:4px; font-size:14px; font-weight:600; color:var(--accent);
    margin-bottom:14px; cursor:pointer; padding:4px 0;
  }
  .back-bar span{font-size:18px;}

  /* More menu rows */
  .more-row{display:flex; align-items:center; gap:14px; padding:14px 12px; border-radius:12px; cursor:pointer; transition:background .15s ease;}
  .more-row:active{background:var(--surface-2);}
  .more-row-icon{width:40px; height:40px; border-radius:11px; background:var(--accent-soft); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0;}
  .more-row-title{font-size:14.5px; font-weight:600;}
  .more-row-sub{font-size:12px; color:var(--ink-soft); margin-top:1px;}
  .more-row-chevron{color:var(--ink-faint); font-size:20px;}

  .grid{display:grid; gap:14px;}
  .grid-4{grid-template-columns:repeat(2,1fr);}
  .grid-3{grid-template-columns:repeat(2,1fr);}
  .grid-2{grid-template-columns:1fr;}

  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; box-shadow:var(--shadow); transition:background .25s ease, border-color .25s ease;
  }
  .card.tight{padding:14px;}
  .card-title{
    font-size:11.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-soft);
    font-weight:700; margin:0 0 12px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }
  .stat-value{font-size:26px; font-weight:700; font-family:'Space Grotesk',sans-serif;}
  .stat-sub{font-size:12px; color:var(--ink-soft); margin-top:2px;}

  .progress-track{width:100%; height:9px; border-radius:6px; background:var(--border); overflow:hidden; margin-top:10px;}
  .progress-fill{height:100%; border-radius:6px; background:var(--accent); transition:width .5s ease;}

  .section-header{margin-bottom:14px;}
  .section-header h2{font-size:19px; margin:0; font-weight:700;}
  .section-header p{margin:2px 0 0; color:var(--ink-soft); font-size:12.5px;}

  .btn{
    border:none; border-radius:10px; padding:10px 16px; font-size:13.5px; font-weight:700;
    cursor:pointer; font-family:'Inter',sans-serif; display:inline-flex; align-items:center; gap:6px;
    transition:opacity .15s ease, transform .1s ease;
  }
  .btn:active{transform:scale(.96);}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-ghost{background:var(--surface-2); color:var(--ink); border:1px solid var(--border);}
  .btn-danger{background:var(--coral-soft); color:var(--coral);}
  .btn-sm{padding:7px 12px; font-size:12.5px;}

  input, textarea, select{
    font-family:'Inter',sans-serif; font-size:14.5px; color:var(--ink);
    background:var(--surface-2); border:1px solid var(--border); border-radius:9px;
    padding:9px 11px; outline:none; width:100%;
  }
  input:focus, textarea:focus, select:focus{border-color:var(--accent);}
  label.field-label{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); margin-bottom:5px; font-weight:700;}

  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{text-align:left; font-size:10px; text-transform:uppercase; letter-spacing:.04em; color:var(--ink-soft); border-bottom:1px solid var(--border); padding:8px 8px; font-weight:700; white-space:nowrap;}
  td{border-bottom:1px solid var(--border); padding:7px 8px; vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  td input, td textarea, td select{background:transparent; border:1px solid transparent; padding:4px 5px; min-width:80px;}
  td input:focus, td textarea:focus, td select:focus{background:var(--surface-2); border-color:var(--accent);}
  .table-wrap{overflow-x:auto; -webkit-overflow-scrolling:touch; margin:0 -4px;}

  .pill{display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700;}
  .pill-todo{background:var(--border); color:var(--ink-soft);}
  .pill-progress{background:var(--amber-soft); color:var(--amber);}
  .pill-done{background:var(--teal-soft); color:var(--teal);}

  .checklist-item{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border);}
  .checklist-item:last-child{border-bottom:none;}
  .checklist-item input[type="checkbox"]{width:19px; height:19px; accent-color:var(--teal); cursor:pointer; flex-shrink:0;}
  .checklist-item input[type="text"]{border:none; background:transparent; flex:1; padding:2px 0;}
  .checklist-item.done input[type="text"]{color:var(--ink-faint); text-decoration:line-through;}
  .icon-btn{background:none; border:none; color:var(--ink-faint); cursor:pointer; font-size:16px; padding:6px;}

  .tabs{display:flex; gap:6px; margin-bottom:14px; border-bottom:1px solid var(--border);}
  .tab{padding:9px 14px; font-size:13px; font-weight:700; color:var(--ink-soft); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px;}
  .tab.active{color:var(--accent); border-bottom-color:var(--accent);}

  .filter-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;}
  .chip-filter{padding:7px 13px; border-radius:20px; font-size:12px; font-weight:700; cursor:pointer; background:var(--surface-2); border:1px solid var(--border); color:var(--ink-soft);}
  .chip-filter.active{background:var(--accent); color:#fff; border-color:var(--accent);}

  .resource-card{display:flex; gap:12px; align-items:flex-start; padding:14px; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--surface-2); margin-bottom:12px;}
  .resource-card .r-icon{width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;}
  .resource-card h4{margin:0 0 3px; font-size:14px;}
  .resource-card p{margin:0; font-size:11.5px; color:var(--ink-soft);}

  .empty-hint{color:var(--ink-faint); font-size:12.5px; text-align:center; padding:18px 0;}
  ::-webkit-scrollbar{width:0; height:0;}

  a{-webkit-tap-highlight-color:transparent;}

  /* ===== App Tour ===== */
  .tour-overlay{
    position:fixed; inset:0; background:rgba(15,17,25,.6); z-index:200;
    display:flex; align-items:flex-end; justify-content:center;
    animation:tourFadeIn .2s ease;
  }
  @keyframes tourFadeIn{from{opacity:0;} to{opacity:1;}}
  .tour-card{
    background:var(--surface); border-radius:22px 22px 0 0; max-width:600px; width:100%;
    padding:28px 22px calc(24px + var(--safe-bottom));
    box-shadow:0 -10px 40px rgba(0,0,0,.3);
    animation:tourSlideUp .25s ease;
  }
  @keyframes tourSlideUp{from{opacity:0; transform:translateY(30px);} to{opacity:1; transform:translateY(0);}}
  .tour-icon{
    width:52px; height:52px; border-radius:14px; background:var(--accent-soft); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:24px; margin-bottom:14px;
  }
  .tour-card h3{font-size:18px; margin:0 0 8px; font-weight:700;}
  .tour-card p{font-size:13.5px; line-height:1.55; color:var(--ink-soft); margin:0 0 18px;}
  .tour-dots{display:flex; gap:6px; margin-bottom:18px;}
  .tour-dot{width:7px; height:7px; border-radius:50%; background:var(--border); transition:all .2s ease;}
  .tour-dot.active{background:var(--accent); width:20px; border-radius:4px;}
  .tour-nav{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .tour-skip{background:none; border:none; color:var(--ink-faint); font-size:13px; font-weight:600; cursor:pointer; padding:8px;}
  .tour-btns{display:flex; gap:8px;}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="tour-overlay" id="tourOverlay" style="display:none;">
    <div class="tour-card" id="tourCard"></div>
  </div>

  <header class="topbar">
    <h1 id="pageTitle">Home</h1>
    <div class="topbar-right">
      <div class="streak-chip">🔥 <span id="topStreak" class="mono">0</span></div>
      <div class="theme-toggle" id="themeToggle">🌙</div>
    </div>
  </header>

  <main class="content" id="content"></main>

  <nav class="bottom-nav">
    <div class="bottom-tab active" data-tabkey="home"><span class="bt-icon">🏠</span>Home</div>
    <div class="bottom-tab" data-tabkey="practice"><span class="bt-icon">🎯</span>Practice</div>
    <div class="bottom-tab" data-tabkey="vocab"><span class="bt-icon">📗</span>Vocab</div>
    <div class="bottom-tab" data-tabkey="progress"><span class="bt-icon">📊</span>Progress</div>
    <div class="bottom-tab" data-tabkey="more"><span class="bt-icon">☰</span>More</div>
  </nav>
</div>

<script>
// ===================== STATE =====================
const STORAGE_KEY = 'ielts-command-center-v1';
const uid = () => Math.random().toString(36).slice(2, 10);
const todayStr = () => new Date().toISOString().slice(0,10);

function defaultState(){
  return {
    theme: 'light',
    hasSeenTour: false,
    bands: { listening: 6.0, reading: 6.0, writing: 5.5, speaking: 6.0, target: 8.0 },
    streak: { current: 0, longest: 0, lastDate: null },
    dailyMinutesToday: 0,
    weeklyGoalMinutes: 600,
    weeklyMinutesLogged: 0,
    todayTasks: [
      { id: uid(), text: 'Write one Task 2 essay', done: false },
      { id: uid(), text: 'Review 15 new vocabulary words', done: false },
      { id: uid(), text: 'Record one Speaking Part 2 answer', done: false }
    ],
    upcomingMock: { date: '', notes: '' },
    quickStats: { mockTests: 0, essaysWritten: 0, vocabLearned: 0, hoursThisWeek: 0 },
    resources: [
      { id:'c18', title:'Cambridge IELTS 18', category:'Practice Book', status:'todo', notes:'' },
      { id:'c19', title:'Cambridge IELTS 19', category:'Practice Book', status:'todo', notes:'' },
      { id:'desc', title:'Official Band Descriptors', category:'Reference', status:'todo', notes:'' },
      { id:'vocab', title:'Vocabulary Notebook', category:'Internal', status:'progress', notes:'See Vocabulary tab' },
      { id:'gram', title:'Grammar Notes', category:'Internal', status:'progress', notes:'See Grammar tab' },
      { id:'speakq', title:'Speaking Question Bank', category:'Practice', status:'todo', notes:'' },
      { id:'writesamp', title:'Band 8-9 Writing Samples', category:'Reference', status:'todo', notes:'' },
      { id:'sites', title:'Useful Websites', category:'Reference', status:'todo', notes:'IELTS Liz, British Council, IDP' }
    ],
    listening: { history: [], mistakes: [], difficultTypes: '', notes: '' },
    reading: { history: [], errors: [], timing: [], difficultTypes: '', notes: '' },
    writing: { task1: [], task2: [], notes: '', commonGrammarMistakes: '', vocabUsed: '' },
    speaking: { log: [], topics: [], vocabUsed: '', fluencyNotes: '', pronunciationNotes: '', bandEstimate: '' },
    vocabulary: [],
    grammar: {
      topics: [
        { id: uid(), name:'Complex sentences & subordination', status:'todo' },
        { id: uid(), name:'Conditionals (incl. mixed)', status:'todo' },
        { id: uid(), name:'Relative clauses', status:'todo' },
        { id: uid(), name:'Passive voice (natural use)', status:'todo' },
        { id: uid(), name:'Inversion for emphasis', status:'todo' },
        { id: uid(), name:'Article usage (a/an/the)', status:'todo' },
        { id: uid(), name:'Tense sequencing', status:'todo' }
      ],
      weakPoints: '', exercisesDone: 0
    },
    progressHistory: [],
    mistakes: [],
    planner: { daily: [], weekly: [], monthly: '' }
  };
}

let state = defaultState();
let ui = { activeSection: 'home', mistakeFilter: 'all', mistakeQuery: '', vocabFilter: 'all', vocabQuery: '', plannerTab: 'daily' };

function deepMerge(base, incoming){
  if (Array.isArray(base)) return incoming !== undefined ? incoming : base;
  if (typeof base === 'object' && base !== null){
    const out = {...base};
    if (incoming && typeof incoming === 'object'){
      Object.keys(base).forEach(k => { out[k] = deepMerge(base[k], incoming[k]); });
    }
    return out;
  }
  return incoming !== undefined ? incoming : base;
}

async function saveState(){
  try{
    await window.storage.set(STORAGE_KEY, JSON.stringify(state));
  }catch(e){ console.error('save failed', e); }
}
const debouncedSave = debounce(saveState, 400);

async function loadState(){
  try{
    const res = await window.storage.get(STORAGE_KEY);
    if (res && res.value){
      const parsed = JSON.parse(res.value);
      state = deepMerge(defaultState(), parsed);
    }
  }catch(e){ /* first run, nothing saved yet */ }
}

function debounce(fn, wait){
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
}

function setPath(obj, path, value){
  const keys = path.split('.');
  let cur = obj;
  for (let i=0;i<keys.length-1;i++) cur = cur[keys[i]];
  cur[keys[keys.length-1]] = value;
}
function getPath(obj, path){
  return path.split('.').reduce((c,k)=> (c==null?undefined:c[k]), obj);
}

// ===================== THEME =====================
function applyTheme(){
  document.documentElement.setAttribute('data-theme', state.theme);
  document.getElementById('themeToggle').textContent = state.theme === 'dark' ? '☀️' : '🌙';
}

// ===================== NAV =====================
const SECTION_TITLES = {
  home:'Home', resources:'Resources', listening:'Listening', reading:'Reading',
  writing:'Writing', speaking:'Speaking', vocabulary:'Vocabulary', grammar:'Grammar',
  progress:'Progress', mistakes:'Mistake Database', planner:'Planner', settings:'Settings', about:'About'
};

function switchSection(name){
  ui.activeSection = name;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.section === name));
  document.getElementById('pageTitle').textContent = SECTION_TITLES[name];
  render();
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('content').scrollTop = 0;
}

// ===================== HELPERS =====================
function overallBand(){
  const b = state.bands;
  const avg = (b.listening + b.reading + b.writing + b.speaking) / 4;
  return Math.round(avg * 2) / 2;
}
function fmtBand(n){ return Number(n).toFixed(1); }

function arcPath(cx, cy, r, pct, colorVar){
  const circumference = 2 * Math.PI * r;
  const dash = Math.max(0, Math.min(1, pct)) * circumference;
  return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(${colorVar})" stroke-width="9"
    stroke-linecap="round" stroke-dasharray="${dash} ${circumference}"
    transform="rotate(-90 ${cx} ${cy})" style="transition:stroke-dasharray .6s ease"/>`;
}

function updateStreakChip(){
  document.getElementById('topStreak').textContent = state.streak.current;
}

function markStudiedToday(){
  const last = state.streak.lastDate;
  const today = todayStr();
  if (last === today) return; // already logged
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
  if (last === yesterday) state.streak.current += 1;
  else state.streak.current = 1;
  state.streak.longest = Math.max(state.streak.longest, state.streak.current);
  state.streak.lastDate = today;
  debouncedSave();
  updateStreakChip();
}

// ===================== RENDER ROOT =====================
function render(){
  const c = document.getElementById('content');
  const renderers = {
    home: renderHome, resources: renderResources, listening: () => renderSkillLog('listening'),
    reading: renderReading, writing: renderWriting, speaking: renderSpeaking,
    vocabulary: renderVocabulary, grammar: renderGrammar, progress: renderProgress,
    mistakes: renderMistakes, planner: renderPlanner, settings: renderSettings
  };
  c.innerHTML = `<div class="section">${renderers[ui.activeSection]()}</div>`;
  bindSection(ui.activeSection);
  updateStreakChip();
}
// ===================== HOME =====================
function renderHome(){
  const ov = overallBand();
  const target = state.bands.target;
  const pct = Math.min(1, (ov - 4) / (target - 4));
  const weeklyPct = Math.min(1, state.weeklyMinutesLogged / Math.max(1,state.weeklyGoalMinutes));

  const ring = (r, val, color, offset) => arcPath(90, 90, r, Math.min(1,val/9), color);

  return `
  <div class="grid grid-2" style="margin-bottom:18px; align-items:stretch;">
    <div class="card" style="display:flex; align-items:center; gap:24px;">
      <svg width="180" height="180" viewBox="0 0 180 180">
        <circle cx="90" cy="90" r="78" fill="none" stroke="var(--border)" stroke-width="9"/>
        <circle cx="90" cy="90" r="63" fill="none" stroke="var(--border)" stroke-width="9"/>
        <circle cx="90" cy="90" r="48" fill="none" stroke="var(--border)" stroke-width="9"/>
        <circle cx="90" cy="90" r="33" fill="none" stroke="var(--border)" stroke-width="9"/>
        ${arcPath(90,90,78, state.bands.listening/9, '--accent')}
        ${arcPath(90,90,63, state.bands.reading/9, '--teal')}
        ${arcPath(90,90,48, state.bands.writing/9, '--amber')}
        ${arcPath(90,90,33, state.bands.speaking/9, '--violet')}
        <text x="90" y="86" text-anchor="middle" font-family="Space Grotesk" font-size="28" font-weight="700" fill="var(--ink)">${fmtBand(ov)}</text>
        <text x="90" y="106" text-anchor="middle" font-family="IBM Plex Mono" font-size="10.5" fill="var(--ink-soft)">of ${fmtBand(target)} target</text>
      </svg>
      <div style="flex:1;">
        <div class="card-title">Band Snapshot</div>
        <div style="display:flex; flex-direction:column; gap:8px;">
          ${legendRow('--accent','Listening',state.bands.listening,'listening')}
          ${legendRow('--teal','Reading',state.bands.reading,'reading')}
          ${legendRow('--amber','Writing',state.bands.writing,'writing')}
          ${legendRow('--violet','Speaking',state.bands.speaking,'speaking')}
        </div>
        <div class="progress-track" style="margin-top:14px;"><div class="progress-fill" style="width:${pct*100}%"></div></div>
        <div class="stat-sub" style="margin-top:6px;">${fmtBand(ov)} → ${fmtBand(target)} · ${Math.round(pct*100)}% of the way there</div>
      </div>
    </div>

    <div class="grid" style="grid-template-columns:1fr 1fr; gap:18px;">
      <div class="card">
        <div class="card-title">Study Streak</div>
        <div class="stat-value">🔥 ${state.streak.current} <span style="font-size:14px; color:var(--ink-soft); font-weight:500;">days</span></div>
        <div class="stat-sub">Longest streak: ${state.streak.longest} days</div>
        <button class="btn btn-primary btn-sm" id="btnMarkStudied" style="margin-top:12px; width:100%; justify-content:center;">✓ Mark today as studied</button>
      </div>
      <div class="card">
        <div class="card-title">Weekly Goal</div>
        <div class="stat-value">${state.weeklyMinutesLogged}<span style="font-size:14px; color:var(--ink-soft); font-weight:500;"> / ${state.weeklyGoalMinutes} min</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${weeklyPct*100}%; background:var(--teal);"></div></div>
        <div class="field" style="margin-top:10px; margin-bottom:0;">
          <label class="field-label">Log minutes studied today</label>
          <div style="display:flex; gap:8px;">
            <input type="number" id="inputMinutesToday" placeholder="e.g. 90">
            <button class="btn btn-primary btn-sm" id="addMinutesBtn">Add</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="grid grid-3" style="margin-bottom:18px;">
    <div class="card">
      <div class="card-title">Today's Tasks <span class="mono" style="color:var(--ink-faint); font-weight:400;">${state.todayTasks.filter(t=>t.done).length}/${state.todayTasks.length}</span></div>
      <div id="todayTaskList">${renderTaskList()}</div>
      <div style="display:flex; gap:8px; margin-top:10px;">
        <input type="text" id="newTaskInput" placeholder="Add a task...">
        <button class="btn btn-ghost btn-sm" id="addTaskBtn">Add</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Upcoming Mock Test</div>
      <div class="field">
        <label class="field-label">Date</label>
        <input type="date" id="mockDate" value="${state.upcomingMock.date}">
      </div>
      <div class="field" style="margin-bottom:0;">
        <label class="field-label">Notes</label>
        <textarea id="mockNotes" rows="3" placeholder="Full test, timed, all 4 skills...">${state.upcomingMock.notes}</textarea>
      </div>
      ${mockCountdownHtml()}
    </div>

    <div class="card">
      <div class="card-title">Quick Statistics</div>
      <div class="grid" style="grid-template-columns:1fr 1fr; gap:10px;">
        ${quickStatBox('Mock Tests', state.quickStats.mockTests, 'mockTests')}
        ${quickStatBox('Essays Written', state.quickStats.essaysWritten, 'essaysWritten')}
        ${quickStatBox('Vocab Learned', state.vocabulary.length, null)}
        ${quickStatBox('Hrs This Week', (state.weeklyMinutesLogged/60).toFixed(1), null)}
      </div>
    </div>
  </div>
  `;
}

function legendRow(colorVar, label, value, key){
  return `<div style="display:flex; align-items:center; gap:8px; font-size:13px;">
    <span style="width:9px; height:9px; border-radius:50%; background:var(${colorVar}); flex-shrink:0;"></span>
    <span style="flex:1; color:var(--ink-soft);">${label}</span>
    <input type="number" step="0.5" min="0" max="9" data-band="${key}" value="${value}" style="width:52px; text-align:center; padding:3px 4px;">
  </div>`;
}

function quickStatBox(label, value, editKey){
  return `<div style="background:var(--surface-2); border-radius:10px; padding:10px 12px;">
    <div style="font-size:19px; font-weight:700; font-family:'Space Grotesk',sans-serif;">${value}</div>
    <div style="font-size:11px; color:var(--ink-soft); margin-top:2px;">${label}</div>
  </div>`;
}

function renderTaskList(){
  if (!state.todayTasks.length) return `<div class="empty-hint">No tasks yet — add your first one below.</div>`;
  return state.todayTasks.map(t => `
    <div class="checklist-item ${t.done?'done':''}" data-task-id="${t.id}">
      <input type="checkbox" class="task-check" ${t.done?'checked':''}>
      <input type="text" class="task-text" value="${escapeAttr(t.text)}">
      <button class="icon-btn task-del">✕</button>
    </div>`).join('');
}

function mockCountdownHtml(){
  if (!state.upcomingMock.date) return `<div class="stat-sub" style="margin-top:8px;">Set a date to see your countdown.</div>`;
  const days = Math.ceil((new Date(state.upcomingMock.date) - new Date()) / 86400000);
  return `<div class="stat-sub" style="margin-top:8px;">${days >= 0 ? days + ' days remaining' : 'Test date has passed'}</div>`;
}

function escapeAttr(s){ return String(s).replace(/"/g,'&quot;'); }
function escapeHtml(s){ return String(s||'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ===================== RESOURCES =====================
const RESOURCE_ICONS = { 'Practice Book':['📘','--accent','--accent-soft'], 'Reference':['📄','--teal','--teal-soft'], 'Internal':['🗂️','--violet','--violet-soft'], 'Practice':['🎯','--amber','--amber-soft'] };

function renderResources(){
  return `
  <div class="section-header">
    <div><h2>Resource Library</h2><p>Your curated set of Band 8 prep materials — track what you've worked through.</p></div>
    <button class="btn btn-ghost btn-sm" id="addResourceBtn">+ Add resource</button>
  </div>
  <div class="grid grid-2" id="resourceGrid">
    ${state.resources.map(r => resourceCardHtml(r)).join('')}
  </div>`;
}

function resourceCardHtml(r){
  const [icon, colorVar, softVar] = RESOURCE_ICONS[r.category] || ['📎','--accent','--accent-soft'];
  const statusPill = { todo:'pill-todo', progress:'pill-progress', done:'pill-done' }[r.status];
  const statusLabel = { todo:'To start', progress:'In progress', done:'Completed' }[r.status];
  return `
  <div class="resource-card" data-res-id="${r.id}">
    <div class="r-icon" style="background:var(${softVar}); color:var(${colorVar});">${icon}</div>
    <div style="flex:1;">
      <div style="display:flex; justify-content:space-between; gap:8px;">
        <h4 contenteditable="true" class="res-title" style="outline:none;">${escapeHtml(r.title)}</h4>
        <button class="icon-btn res-del">✕</button>
      </div>
      <p>${r.category}</p>
      <textarea class="res-notes" rows="2" placeholder="Notes, links, page numbers...">${r.notes}</textarea>
      <div style="display:flex; gap:6px; margin-top:8px;">
        <span class="pill ${statusPill} res-status-pill" data-status="todo" style="cursor:pointer; ${r.status==='todo'?'':'opacity:.45'}">To start</span>
        <span class="pill pill-progress res-status-pill" data-status="progress" style="cursor:pointer; ${r.status==='progress'?'':'opacity:.45'}">In progress</span>
        <span class="pill pill-done res-status-pill" data-status="done" style="cursor:pointer; ${r.status==='done'?'':'opacity:.45'}">Completed</span>
      </div>
    </div>
  </div>`;
}

// ===================== LISTENING (shared template also used by Reading base) =====================
function renderSkillLog(skill){
  const S = state[skill];
  const totalQ = S.history.reduce((a,h)=>a+(Number(h.total)||0),0);
  const correctQ = S.history.reduce((a,h)=>a+(Number(h.correct)||0),0);
  const accuracy = totalQ ? Math.round((correctQ/totalQ)*100) : null;

  return `
  <div class="section-header">
    <div><h2>${skill==='listening'?'🎧':'📖'} ${skill[0].toUpperCase()+skill.slice(1)}</h2><p>Log every practice session and track recurring error types.</p></div>
  </div>

  <div class="grid grid-3" style="margin-bottom:18px;">

function lineChartSvg(hist){
  const W = 780, H = 220, pad = 34;
  const sorted = [...hist].sort((a,b)=> new Date(a.date) - new Date(b.date));
  const n = sorted.length;
  const xStep = (W - pad*2) / Math.max(1,n-1);
  const yFor = (band) => H - pad - ((band-4)/5)*(H-pad*2);
  const xFor = (i) => pad + i*xStep;

  const series = [
    { key:'listening', color:'var(--accent)' },
    { key:'reading', color:'var(--teal)' },
    { key:'writing', color:'var(--amber)' },
    { key:'speaking', color:'var(--violet)' }
  ];

  const gridLines = [4,5,6,7,8,9].map(v => `
    <line x1="${pad}" y1="${yFor(v)}" x2="${W-pad}" y2="${yFor(v)}" stroke="var(--border)" stroke-width="1"/>
    <text x="${pad-8}" y="${yFor(v)+4}" text-anchor="end" font-family="IBM Plex Mono" font-size="10" fill="var(--ink-faint)">${v}</text>`).join('');

  const paths = series.map(s => {
    const pts = sorted.map((h,i) => `${xFor(i)},${yFor(h[s.key]||4)}`).join(' ');
    const dots = sorted.map((h,i) => `<circle cx="${xFor(i)}" cy="${yFor(h[s.key]||4)}" r="3.5" fill="${s.color}"/>`).join('');
    return `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${dots}`;
  }).join('');

  const xLabels = sorted.map((h,i) => `<text x="${xFor(i)}" y="${H-8}" text-anchor="middle" font-family="IBM Plex Mono" font-size="9.5" fill="var(--ink-faint)">${(h.date||'').slice(5)}</text>`).join('');

  const legend = `<div style="display:flex; gap:16px; margin-top:10px; flex-wrap:wrap;">
    ${series.map(s=>`<div style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-soft);"><span style="width:10px;height:10px;border-radius:50%;background:${s.color};"></span>${s.key[0].toUpperCase()+s.key.slice(1)}</div>`).join('')}
  </div>`;

  return `<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${gridLines}${paths}${xLabels}</svg>${legend}`;
}

  <div class="section-header"><div><h2>📅 Planner</h2><p>Daily tasks, weekly focus, and monthly goals — all in one place.</p></div></div>

  <div class="tabs">
    <div class="tab ${tab==='daily'?'active':''}" data-ptab="daily">Daily</div>
    <div class="tab ${tab==='weekly'?'active':''}" data-ptab="weekly">Weekly</div>
    <div class="tab ${tab==='monthly'?'active':''}" data-ptab="monthly">Monthly</div>
  </div>

  ${tab==='monthly' ? `
    <div class="card">
      <div class="card-title">Monthly Goals</div>
      <textarea id="plannerMonthly" rows="8" placeholder="e.g. Reach Band 7 average across all mocks by end of month...">${state.planner.monthly}</textarea>
    </div>` : plannerListHtml(tab)}
  `;
}

function plannerListHtml(tab){
  const items = state.planner[tab];
  return `
  <div class="card">
    <div class="card-title">${tab==='daily'?'Daily Checklist':'Weekly Focus Items'} <button class="btn btn-ghost btn-sm" id="plannerAdd${tab}">+ Add item</button></div>
    <div id="planner${tab}List">
      ${items.map(it => `
      <div class="checklist-item ${it.done?'done':''}" data-item-id="${it.id}">
        <input type="checkbox" class="p-check" ${it.done?'checked':''}>
        <input type="text" class="p-text" value="${escapeAttr(it.text)}">
        <button class="icon-btn p-del">✕</button>
      </div>`).join('') || `<div class="empty-hint">Nothing planned yet — add your first item.</div>`}
    </div>
  </div>`;
}

function renderSettings(){
  return `
  <div class="section-header"><div><h2>⚙️ Settings</h2><p>Appearance and data controls for your workspace.</p></div></div>

  <div class="grid grid-2">
    <div class="card">
      <div class="card-title">Appearance</div>
      <div style="display:flex; gap:10px;">
        <button class="btn ${state.theme==='light'?'btn-primary':'btn-ghost'} btn-sm" id="setLightMode">☀️ Light mode</button>
        <button class="btn ${state.theme==='dark'?'btn-primary':'btn-ghost'} btn-sm" id="setDarkMode">🌙 Dark mode</button>
      </div>
    </div>
    <div class="card">
      <div class="card-title">New Here?</div>
      <p class="stat-sub" style="margin-bottom:10px;">Replay the quick tour of what each section does.</p>
      <button class="btn btn-ghost btn-sm" id="settingsTakeTourBtn">🎓 Take the tour</button>
    </div>
    <div class="card">
      <div class="card-title">Weekly Study Goal</div>
      <div class="field" style="margin-bottom:0;">
        <label class="field-label">Target minutes per week</label>
        <input type="number" id="settingsWeeklyGoal" value="${state.weeklyGoalMinutes}">
      </div>
    </div>
  </div>

  <div class="grid grid-2" style="margin-top:18px;">
    <div class="card">
      <div class="card-title">Export Your Data</div>
      <p class="stat-sub" style="margin-bottom:12px;">Download everything as a JSON file — a full backup of every log, table, and note.</p>
      <button class="btn btn-primary btn-sm" id="exportDataBtn">⬇ Export data</button>
    </div>
    <div class="card">
      <div class="card-title" style="color:var(--coral);">Reset Progress</div>
      <p class="stat-sub" style="margin-bottom:12px;">Permanently clears all logged data on this device. This cannot be undone.</p>
      <button class="btn btn-danger btn-sm" id="resetDataBtn">Reset all progress</button>
    </div>
  </div>

  <div class="card" style="margin-top:18px;">
    <div class="card-title">About Your Data</div>
    <p class="stat-sub" style="margin:0 0 10px;">This workspace saves automatically to your Claude account's artifact storage as you go — there's no external server involved. Data here is private to you and won't be visible to anyone else.</p>
    <p class="stat-sub" style="margin:0;">Built by <strong style="color:var(--ink);">Azal Hoseinian</strong> · <a href="https://www.linkedin.com/in/azamhosseinian" target="_blank" rel="noopener noreferrer" style="color:var(--accent); text-decoration:none;">linkedin.com/in/azamhosseinian</a></p>
  </div>`;
}

function bindSection(name){
  const binders = {
    home: bindHome, resources: bindResources, listening: () => bindSkillLog('listening'),
    reading: bindReading, writing: bindWriting, speaking: bindSpeaking,
    vocabulary: bindVocabulary, grammar: bindGrammar, progress: bindProgress,
    mistakes: bindMistakes, planner: bindPlanner, settings: bindSettings,
    moreMenu: bindMoreMenu, about: bindAbout
  };
  binders[name]();
}

function on(id, evt, fn){ const el = document.getElementById(id); if (el) el.addEventListener(evt, fn); }
function onAll(selector, evt, fn){ document.querySelectorAll(selector).forEach(el => el.addEventListener(evt, fn)); }
function rowState(arr, id){ return arr.find(x => x.id === id); }

// ===================== HOME =====================
function bindHome(){
  onAll('[data-band]', 'change', e => {
    state.bands[e.target.dataset.band] = parseFloat(e.target.value) || 0;
    debouncedSave(); render();
  });
  on('btnMarkStudied', 'click', markStudiedToday);
  on('addMinutesBtn', 'click', () => {
    const input = document.getElementById('inputMinutesToday');
    const val = parseInt(input.value) || 0;
    if (val > 0){
      state.weeklyMinutesLogged += val;
      state.dailyMinutesToday = val;
      debouncedSave(); render();
    }
  });
  on('mockDate', 'change', e => { state.upcomingMock.date = e.target.value; debouncedSave(); render(); });
  on('mockNotes', 'input', debounce(e => { state.upcomingMock.notes = e.target.value; debouncedSave(); }, 300));
  on('addTaskBtn', 'click', () => {
    const input = document.getElementById('newTaskInput');
    if (input.value.trim()){
      state.todayTasks.push({ id: uid(), text: input.value.trim(), done:false });
      debouncedSave(); render();
    }
  });
  on('newTaskInput', 'keydown', e => { if (e.key==='Enter') document.getElementById('addTaskBtn').click(); });
  document.querySelectorAll('.task-check').forEach(cb => cb.addEventListener('change', e => {
    const id = e.target.closest('[data-task-id]').dataset.taskId;
    const t = rowState(state.todayTasks, id); if (t){ t.done = e.target.checked; debouncedSave(); render(); }
  }));
  document.querySelectorAll('.task-text').forEach(inp => inp.addEventListener('input', debounce(e => {
    const id = e.target.closest('[data-task-id]').dataset.taskId;
    const t = rowState(state.todayTasks, id); if (t){ t.text = e.target.value; debouncedSave(); }
  },300)));
  document.querySelectorAll('.task-del').forEach(btn => btn.addEventListener('click', e => {
    const id = e.target.closest('[data-task-id]').dataset.taskId;
    state.todayTasks = state.todayTasks.filter(t => t.id !== id);
    debouncedSave(); render();
  }));
  document.querySelectorAll('.quick-stat-edit').forEach(()=>{});
}

// ===================== RESOURCES =====================
function bindResources(){
  on('addResourceBtn', 'click', () => {
    state.resources.push({ id: uid(), title:'New resource', category:'Reference', status:'todo', notes:'' });
    debouncedSave(); render();
  });
  document.querySelectorAll('[data-res-id]').forEach(card => {
    const id = card.dataset.resId;
    const r = rowState(state.resources, id);
    card.querySelector('.res-title').addEventListener('input', debounce(e => { r.title = e.target.textContent; debouncedSave(); },300));
    card.querySelector('.res-notes').addEventListener('input', debounce(e => { r.notes = e.target.value; debouncedSave(); },300));
    card.querySelector('.res-del').addEventListener('click', () => {
      state.resources = state.resources.filter(x => x.id !== id); debouncedSave(); render();
    });
    card.querySelectorAll('.res-status-pill').forEach(p => p.addEventListener('click', () => {
      r.status = p.dataset.status; debouncedSave(); render();
    }));
  });
}

// ===================== SHARED TABLE HELPERS =====================
function bindHistoryTable(skill, containerId, arr, extraFieldMap){
  document.querySelectorAll(`#${containerId} tr[data-id]`).forEach(tr => {
    const id = tr.dataset.id;
    const row = rowState(arr, id);
    if (!row) return;
    Object.keys(extraFieldMap).forEach(cls => {
      const el = tr.querySelector('.'+cls);
      if (el) el.addEventListener(el.tagName==='SELECT' || el.type==='date' ? 'change':'input', debounce(e => {
        row[extraFieldMap[cls]] = e.target.value; debouncedSave();
      }, 300));
    });
  });
}

// ===================== LISTENING =====================
function bindSkillLog(skill){
  const S = state[skill];
  on(`${skill}DifficultTypes`, 'input', debounce(e => { S.difficultTypes = e.target.value; debouncedSave(); },300));
  on(`${skill}Notes`, 'input', debounce(e => { S.notes = e.target.value; debouncedSave(); },300));
  on(`${skill}AddHistory`, 'click', () => {
    S.history.push({ id:uid(), date: todayStr(), source:'', types:'', correct:'', total:'' });
    debouncedSave(); render();
  });
  on(`${skill}AddMistake`, 'click', () => {
    S.mistakes.push({ id:uid(), date: todayStr(), type:'', wrong:'', fix:'' });
    debouncedSave(); render();
  });
  bindHistoryTable(skill, `${skill}HistoryBody`, S.history, { 'h-date':'date','h-source':'source','h-types':'types','h-correct':'correct','h-total':'total' });
  bindHistoryTable(skill, `${skill}MistakeBody`, S.mistakes, { 'm-date':'date','m-type':'type','m-wrong':'wrong','m-fix':'fix' });
  document.querySelectorAll(`#${skill}HistoryBody .h-del`).forEach(btn => btn.addEventListener('click', e => {
    const id = e.target.closest('tr').dataset.id; S.history = S.history.filter(x=>x.id!==id); debouncedSave(); render();
  }));
  document.querySelectorAll(`#${skill}MistakeBody .m-del`).forEach(btn => btn.addEventListener('click', e => {
    const id = e.target.closest('tr').dataset.id; S.mistakes = S.mistakes.filter(x=>x.id!==id); debouncedSave(); render();
  }));
}

// ===================== READING =====================
function bindReading(){
  const S = state.reading;
  on('readingDifficultTypes', 'input', debounce(e => { S.difficultTypes = e.target.value; debouncedSave(); },300));
  on('readingNotes', 'input', debounce(e => { S.notes = e.target.value; debouncedSave(); },300));
  on('readingAddHistory', 'click', () => { S.history.push({id:uid(), date:todayStr(), source:'', types:'', correct:'', total:''}); debouncedSave(); render(); });
  on('readingAddTiming', 'click', () => { S.timing.push({id:uid(), date:todayStr(), passage:'', minutes:''}); debouncedSave(); render(); });
  on('readingAddError', 'click', () => { S.errors.push({id:uid(), date:todayStr(), type:'', wrong:'', fix:''}); debouncedSave(); render(); });

  bindHistoryTable('reading','readingHistoryBody', S.history, {'h-date':'date','h-source':'source','h-types':'types','h-correct':'correct','h-total':'total'});
  bindHistoryTable('reading','readingTimingBody', S.timing, {'t-date':'date','t-passage':'passage','t-minutes':'minutes'});
  bindHistoryTable('reading','readingErrorBody', S.errors, {'m-date':'date','m-type':'type','m-wrong':'wrong','m-fix':'fix'});

  document.querySelectorAll('#readingHistoryBody .h-del').forEach(b=>b.addEventListener('click', e=>{ const id=e.target.closest('tr').dataset.id; S.history=S.history.filter(x=>x.id!==id); debouncedSave(); render(); }));
  document.querySelectorAll('#readingTimingBody .t-del').forEach(b=>b.addEventListener('click', e=>{ const id=e.target.closest('tr').dataset.id; S.timing=S.timing.filter(x=>x.id!==id); debouncedSave(); render(); }));
  document.querySelectorAll('#readingErrorBody .m-del').forEach(b=>b.addEventListener('click', e=>{ const id=e.target.closest('tr').dataset.id; S.errors=S.errors.filter(x=>x.id!==id); debouncedSave(); render(); }));
}

// ===================== WRITING =====================
ui.writingTab = 'task1';
function bindWriting(){
  const S = state.writing;
  document.querySelectorAll('[data-wtab]').forEach(tab => tab.addEventListener('click', () => {
    ui.writingTab = tab.dataset.wtab; render();
  }));
  ['task1','task2'].forEach(task => {
    on(`writingAdd${task}`, 'click', () => {
      S[task].push({id:uid(), date:todayStr(), topic:'', band:'', time:'', note:''});
      debouncedSave(); render();
    });
    bindHistoryTable('writing', `writing${task}Body`, S[task], {'w-date':'date','w-topic':'topic','w-band':'band','w-time':'time','w-note':'note'});
    document.querySelectorAll(`#writing${task}Body .w-del`).forEach(b=>b.addEventListener('click', e=>{
      const id=e.target.closest('tr').dataset.id; S[task]=S[task].filter(x=>x.id!==id); debouncedSave(); render();
    }));
  });
  on('writingGrammarMistakes','input', debounce(e=>{ S.commonGrammarMistakes=e.target.value; debouncedSave(); },300));
  on('writingVocabUsed','input', debounce(e=>{ S.vocabUsed=e.target.value; debouncedSave(); },300));
  on('writingNotes','input', debounce(e=>{ S.notes=e.target.value; debouncedSave(); },300));
}

// ===================== SPEAKING =====================
function bindSpeaking(){
  const S = state.speaking;
  on('speakingBandEstimate','input', debounce(e=>{ S.bandEstimate=e.target.value; debouncedSave(); },300));
  on('speakingTopics','input', debounce(e=>{ S.topics = e.target.value.split(',').map(s=>s.trim()).filter(Boolean); debouncedSave(); },300));
  on('speakingVocabUsed','input', debounce(e=>{ S.vocabUsed=e.target.value; debouncedSave(); },300));
  on('speakingFluencyNotes','input', debounce(e=>{ S.fluencyNotes=e.target.value; debouncedSave(); },300));
  on('speakingPronunciationNotes','input', debounce(e=>{ S.pronunciationNotes=e.target.value; debouncedSave(); },300));
  on('speakingAddLog','click', ()=>{ S.log.push({id:uid(), date:todayStr(), part:'', topic:'', band:'', note:''}); debouncedSave(); render(); });
  bindHistoryTable('speaking','speakingLogBody', S.log, {'sp-date':'date','sp-part':'part','sp-topic':'topic','sp-band':'band','sp-note':'note'});
  document.querySelectorAll('#speakingLogBody .sp-del').forEach(b=>b.addEventListener('click', e=>{
    const id=e.target.closest('tr').dataset.id; S.log=S.log.filter(x=>x.id!==id); debouncedSave(); render();
  }));
}

// ===================== VOCABULARY =====================
function bindVocabulary(){
  on('vocabAddBtn','click', () => {
    state.vocabulary.unshift({id:uid(), term:'', type:'word', meaning:'', example:'', status:'new'});
    debouncedSave(); render();
  });
  on('vocabSearch','input', debounce(e => { ui.vocabQuery = e.target.value; render(); }, 250));
  document.querySelectorAll('[data-vocabtype]').forEach(chip => chip.addEventListener('click', () => {
    ui.vocabFilter = chip.dataset.vocabtype; render();
  }));
  document.querySelectorAll('#vocabBody tr[data-id]').forEach(tr => {
    const id = tr.dataset.id;
    const v = rowState(state.vocabulary, id);
    if (!v) return;
    tr.querySelector('.v-term').addEventListener('input', debounce(e=>{ v.term=e.target.value; debouncedSave(); },300));
    tr.querySelector('.v-type').addEventListener('change', e=>{ v.type=e.target.value; debouncedSave(); });
    tr.querySelector('.v-meaning').addEventListener('input', debounce(e=>{ v.meaning=e.target.value; debouncedSave(); },300));
    tr.querySelector('.v-example').addEventListener('input', debounce(e=>{ v.example=e.target.value; debouncedSave(); },300));
    tr.querySelector('.v-status').addEventListener('change', e=>{ v.status=e.target.value; debouncedSave(); });
    tr.querySelector('.v-del').addEventListener('click', ()=>{ state.vocabulary = state.vocabulary.filter(x=>x.id!==id); debouncedSave(); render(); });
  });
}

// ===================== GRAMMAR =====================
function bindGrammar(){
  const G = state.grammar;
  on('grammarAddTopic','click', () => { G.topics.push({id:uid(), name:'New topic', status:'todo'}); debouncedSave(); render(); });
  on('grammarWeakPoints','input', debounce(e=>{ G.weakPoints=e.target.value; debouncedSave(); },300));
  on('grammarExPlus','click', ()=>{ G.exercisesDone++; debouncedSave(); render(); });
  on('grammarExMinus','click', ()=>{ G.exercisesDone = Math.max(0,G.exercisesDone-1); debouncedSave(); render(); });
  document.querySelectorAll('[data-topic-id]').forEach(row => {
    const id = row.dataset.topicId;
    const t = rowState(G.topics, id);
    row.querySelector('.g-topic-name').addEventListener('input', debounce(e=>{ t.name=e.target.value; debouncedSave(); },300));
    row.querySelector('.g-topic-status').addEventListener('change', e=>{ t.status=e.target.value; debouncedSave(); render(); });
    row.querySelector('.g-topic-del').addEventListener('click', ()=>{ G.topics = G.topics.filter(x=>x.id!==id); debouncedSave(); render(); });
  });
}

// ===================== PROGRESS =====================
function bindProgress(){
  on('progressAddSnapshot','click', () => {
    state.progressHistory.push({ id:uid(), date: todayStr(), ...state.bands });
    debouncedSave(); render();
  });
}

// ===================== MISTAKES =====================
function bindMistakes(){
  on('mistakeAddBtn','click', () => {
    state.mistakes.unshift({id:uid(), date:todayStr(), category:'Grammar', description:'', fix:'', status:'active'});
    debouncedSave(); render();
  });
  on('mistakeSearch','input', debounce(e => { ui.mistakeQuery = e.target.value; render(); }, 250));
  document.querySelectorAll('[data-mistakecat]').forEach(chip => chip.addEventListener('click', () => {
    ui.mistakeFilter = chip.dataset.mistakecat; render();
  }));
  document.querySelectorAll('#mistakeBody tr[data-id]').forEach(tr => {
    const id = tr.dataset.id;
    const m = rowState(state.mistakes, id);
    if (!m) return;
    tr.querySelector('.md-date').addEventListener('change', e=>{ m.date=e.target.value; debouncedSave(); });
    tr.querySelector('.md-cat').addEventListener('change', e=>{ m.category=e.target.value; debouncedSave(); });
    tr.querySelector('.md-desc').addEventListener('input', debounce(e=>{ m.description=e.target.value; debouncedSave(); },300));
    tr.querySelector('.md-fix').addEventListener('input', debounce(e=>{ m.fix=e.target.value; debouncedSave(); },300));
    tr.querySelector('.md-status').addEventListener('change', e=>{ m.status=e.target.value; debouncedSave(); render(); });
    tr.querySelector('.md-del').addEventListener('click', ()=>{ state.mistakes = state.mistakes.filter(x=>x.id!==id); debouncedSave(); render(); });
  });
}

// ===================== PLANNER =====================
function bindPlanner(){
  document.querySelectorAll('[data-ptab]').forEach(tab => tab.addEventListener('click', () => {
    ui.plannerTab = tab.dataset.ptab; render();
  }));
  if (ui.plannerTab === 'monthly'){
    on('plannerMonthly','input', debounce(e=>{ state.planner.monthly = e.target.value; debouncedSave(); },300));
    return;
  }
  const tab = ui.plannerTab;
  on(`plannerAdd${tab}`, 'click', () => {
    state.planner[tab].push({id:uid(), text:'', done:false});
    debouncedSave(); render();
  });
  document.querySelectorAll(`#planner${tab}List [data-item-id]`).forEach(row => {
    const id = row.dataset.itemId;
    const item = rowState(state.planner[tab], id);
    row.querySelector('.p-check').addEventListener('change', e => { item.done = e.target.checked; debouncedSave(); render(); });
    row.querySelector('.p-text').addEventListener('input', debounce(e => { item.text = e.target.value; debouncedSave(); },300));
    row.querySelector('.p-del').addEventListener('click', () => {
      state.planner[tab] = state.planner[tab].filter(x => x.id !== id); debouncedSave(); render();
    });
  });
}

// ===================== SETTINGS =====================
function bindSettings(){
  on('setLightMode','click', () => { state.theme='light'; applyTheme(); debouncedSave(); render(); });
  on('setDarkMode','click', () => { state.theme='dark'; applyTheme(); debouncedSave(); render(); });
  on('settingsTakeTourBtn','click', showTour);
  on('settingsWeeklyGoal','change', e => { state.weeklyGoalMinutes = parseInt(e.target.value)||600; debouncedSave(); });
  on('exportDataBtn','click', () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'ielts-band8-data.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
  on('resetDataBtn','click', () => {
    if (confirm('This will permanently erase all logged progress on this device. Continue?')){
      state = defaultState();
      saveState();
      applyTheme();
      switchSection('home');
    }
  });
}

// ===================== MOBILE RENDER OVERRIDE =====================
function render(){
  const c = document.getElementById('content');
  const renderers = {
    home: renderHome, resources: renderResources, listening: () => renderSkillLog('listening'),
    reading: renderReading, writing: renderWriting, speaking: renderSpeaking,
    vocabulary: renderVocabulary, grammar: renderGrammar, progress: renderProgress,
    mistakes: renderMistakes, planner: renderPlanner, settings: renderSettings,
    moreMenu: renderMoreMenu, about: renderAbout
  };
  const group = GROUPS[ui.activeSection];
  let subnav = '';
  if (group === 'practice') subnav = subTabsHtml(['listening','reading','writing','speaking'], ui.activeSection);
  else if (group === 'vocab') subnav = subTabsHtml(['vocabulary','grammar'], ui.activeSection);
  else if (group === 'more' && ui.activeSection !== 'moreMenu') subnav = backBarHtml();

  document.getElementById('pageTitle').textContent = ui.activeSection === 'moreMenu' ? 'More' : SECTION_TITLES[ui.activeSection];
  c.innerHTML = `<div class="section">${subnav}${renderers[ui.activeSection]()}</div>`;
  bindSection(ui.activeSection);
  bindSubnav();
  updateBottomNavActive();
  updateStreakChip();
}

// ===================== APP TOUR =====================
const TOUR_STEPS = [
  { icon:'👋', title:'Welcome to Band 8', body:'This is your all-in-one workspace for going from Band 5.5–6.0 to an overall Band 8 in IELTS Academic. Here’s a 60-second tour.' },
  { icon:'🏠', title:'Home', body:'Your daily glance: current band vs. target, study streak, weekly time, today’s tasks, and your upcoming mock test countdown.' },
  { icon:'🎯', title:'Practice', body:'Listening, Reading, Writing, and Speaking each have their own log — switch between them with the tabs at the top. Record every session and mistake here.' },
  { icon:'📗', title:'Vocab', body:'Switch between Vocabulary and Grammar. Build a searchable word bank and track which grammar structures you’ve actually mastered.' },
  { icon:'📊', title:'Progress', body:'A real chart of your band score over time for all four skills. Log a "band snapshot" whenever you take a mock test.' },
  { icon:'☰', title:'More', body:'Resources, Mistake Database, Planner, Settings, and this About page all live here — tap any row to open it, then use the back arrow to return.' },
  { icon:'🚀', title:'You’re ready', body:'Everything saves automatically and privately on this device. Start on Home, log your first task, and begin the climb to Band 8.' }
];
let tourIdx = 0;

function renderTourStep(){
  const step = TOUR_STEPS[tourIdx];
  const card = document.getElementById('tourCard');
  const isLast = tourIdx === TOUR_STEPS.length - 1;
  const isFirst = tourIdx === 0;
  card.innerHTML = `
    <div class="tour-icon">${step.icon}</div>
    <h3>${step.title}</h3>
    <p>${step.body}</p>
    <div class="tour-dots">${TOUR_STEPS.map((_,i)=>`<div class="tour-dot ${i===tourIdx?'active':''}"></div>`).join('')}</div>
    <div class="tour-nav">
      <button class="tour-skip" id="tourSkipBtn">${isLast?'':'Skip'}</button>
      <div class="tour-btns">
        ${!isFirst ? `<button class="btn btn-ghost btn-sm" id="tourBackBtn">Back</button>` : ''}
        <button class="btn btn-primary btn-sm" id="tourNextBtn">${isLast?'Get started':'Next'}</button>
      </div>
    </div>`;
  document.getElementById('tourNextBtn').addEventListener('click', () => {
    if (isLast) closeTour(); else { tourIdx++; renderTourStep(); }
  });
  if (!isFirst) document.getElementById('tourBackBtn').addEventListener('click', () => { tourIdx--; renderTourStep(); });
  if (!isLast) document.getElementById('tourSkipBtn').addEventListener('click', closeTour);
}

function showTour(){
  tourIdx = 0;
  document.getElementById('tourOverlay').style.display = 'flex';
  renderTourStep();
}
function closeTour(){
  document.getElementById('tourOverlay').style.display = 'none';
  state.hasSeenTour = true;
  debouncedSave();
}

async function init(){
  await loadState();
  applyTheme();
  updateStreakChip();

  document.querySelectorAll('.bottom-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const key = tab.dataset.tabkey;
      if (key === 'home') ui.activeSection = 'home';
      else if (key === 'progress') ui.activeSection = 'progress';
      else if (key === 'more') ui.activeSection = 'moreMenu';
      else ui.activeSection = ui.lastInGroup[key];
      render();
    });
  });

  document.getElementById('themeToggle').addEventListener('click', () => {
    state.theme = state.theme === 'dark' ? 'light' : 'dark';
    applyTheme(); debouncedSave();
    if (ui.activeSection === 'settings') render();
  });

  render();
  if (!state.hasSeenTour) showTour();
}

init();

</script>
